  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 24px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 15px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 17px; font-weight: 700; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monos  { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 14px; fill: #334155; }
    .cap    { font-size: 14.5px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 600; }
  </style>
<text x="810.0" y="46" text-anchor="middle" class="title">LayerNorm vs RMSNorm：都在单个 token 的特征维上算；RMSNorm 省掉「减均值」与 β</text>
<rect x="147.5" y="92" width="585.0" height="24" rx="7" fill="#dbeafe" stroke="#2563eb" stroke-width="1.3"/>
<text x="440" y="108.5" text-anchor="middle" class="tag" fill="#2563eb">归一化「沿哪个方向」统计：LayerNorm 横向（每 token）vs BatchNorm 纵向（跨样本）</text>
<rect x="150" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="200" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="250" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="300" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="150" y="217" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<rect x="200" y="217" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<rect x="250" y="217" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<rect x="300" y="217" width="42" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<rect x="150" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="200" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="250" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="300" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="144" y="211" width="204" height="42" rx="7" fill="none" stroke="#2563eb" stroke-width="2.6"/>
<text x="142" y="163" class="small">特征维 →</text>
<text x="120" y="238.0" class="small" transform="rotate(-90 120 238.0)" text-anchor="middle">样本 / token ↑</text>
<text x="250.0" y="335" text-anchor="middle" class="sub" fill="#2563eb">LayerNorm：沿一行（一个 token 的 d 个特征）</text>
<rect x="470" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="520" y="175" width="42" height="34" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<rect x="570" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="620" y="175" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="470" y="217" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="520" y="217" width="42" height="34" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<rect x="570" y="217" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="620" y="217" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="470" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="520" y="259" width="42" height="34" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<rect x="570" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="620" y="259" width="42" height="34" rx="5" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="514" y="169" width="50" height="130" rx="7" fill="none" stroke="#dc2626" stroke-width="2.6"/>
<text x="462" y="163" class="small">特征维 →</text>
<text x="440" y="238.0" class="small" transform="rotate(-90 440 238.0)" text-anchor="middle">样本 / token ↑</text>
<text x="570.0" y="335" text-anchor="middle" class="sub" fill="#dc2626">BatchNorm：沿一列（同一特征、跨样本）</text>
<text x="350" y="367" text-anchor="middle" class="sub">Transformer 用左边（与 batch、与别的 token 无关）；CNN 时代的 BatchNorm 是右边</text>
<rect x="880" y="150" width="620" height="150" rx="12" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
<text x="900" y="184" class="lbl" fill="#0d9488">LayerNorm（原版 Transformer）</text>
<text x="900" y="224" class="mono">x̂ = (x − μ) / √(σ² + ε)</text>
<text x="900" y="254" class="mono">out = γ ⊙ x̂ + β</text>
<text x="900" y="284" class="sub">减均值 μ（中心化）+ 除标准差 σ + 缩放 γ + 平移 β</text>
<rect x="880" y="360" width="620" height="150" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="900" y="394" class="lbl" fill="#ea580c">RMSNorm（LLaMA / Qwen 默认）</text>
<text x="900" y="434" class="mono">RMS(x) = √(mean(x²) + ε)</text>
<text x="900" y="464" class="mono">out = γ ⊙ x / RMS(x)</text>
<text x="900" y="494" class="sub">不减均值、无 β：只「重新缩放」，更省算、更省参数</text>
<text x="810.0" y="578" text-anchor="middle" class="cap">差别只两处：RMSNorm 不减均值（分母用均方根而非标准差）、没有平移 β。实测质量几乎无损，故成现代 LLM 默认。</text>
</svg>
