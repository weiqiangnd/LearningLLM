<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 640">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
    <marker id="aTeal" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#0d9488"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 24px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 15px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 17px; font-weight: 700; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monos  { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 14px; fill: #334155; }
    .cap    { font-size: 14.5px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 600; }
  </style>
<text x="780.0" y="46" text-anchor="middle" class="title">SwiGLU：门路径 SiLU(x·W_gate) 与内容路径 x·W_up 逐元素相乘，再过 W_down 降维</text>
<rect x="92.0" y="250.0" width="96" height="80" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="140" y="286" text-anchor="middle" class="monob">x</text>
<text x="140" y="306" text-anchor="middle" class="small">d_model</text>
<path d="M 188 278 C 260 278, 300 175, 380 175" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="375.0" y="137.0" width="150" height="76" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="450" y="171" text-anchor="middle" class="mono">W_gate</text>
<text x="450" y="191" text-anchor="middle" class="small">升维</text>
<line x1="525" y1="175" x2="640" y2="175" stroke="#059669" stroke-width="2" marker-end="url(#aGreen)"/>
<rect x="645.0" y="137.0" width="150" height="76" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="720" y="171" text-anchor="middle" class="lbl">SiLU</text>
<text x="720" y="191" text-anchor="middle" class="small">门控（非 0~1）</text>
<text x="585" y="131" text-anchor="middle" class="sub" fill="#059669">门路径（gate）</text>
<path d="M 188 302 C 260 302, 300 405, 380 405" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="375.0" y="367.0" width="150" height="76" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="450" y="401" text-anchor="middle" class="mono">W_up</text>
<text x="450" y="421" text-anchor="middle" class="small">升维</text>
<text x="585" y="461" text-anchor="middle" class="sub" fill="#7c3aed">内容路径（up，不过激活）</text>
<line x1="795" y1="175" x2="956" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#aGreen)"/>
<line x1="525" y1="405" x2="956" y2="320" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<circle cx="980" cy="290" r="26" fill="#ffedd5" stroke="#ea580c" stroke-width="2.2"/>
<text x="980" y="299" text-anchor="middle" class="title" fill="#ea580c">⊙</text>
<text x="980" y="250" text-anchor="middle" class="sub" fill="#ea580c">逐元素相乘</text>
<line x1="1006" y1="290" x2="1125" y2="290" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="1125.0" y="250.0" width="150" height="80" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="1200" y="286" text-anchor="middle" class="mono">W_down</text>
<text x="1200" y="306" text-anchor="middle" class="small">降维</text>
<line x1="1275" y1="290" x2="1410" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<rect x="1410.0" y="250.0" width="80" height="80" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1450" y="286" text-anchor="middle" class="monob">out</text>
<text x="1450" y="306" text-anchor="middle" class="small">d_model</text>
<rect x="240.0" y="536" width="1080" height="44" rx="10" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.4"/>
<text x="780.0" y="565" text-anchor="middle" class="mono">FFN_SwiGLU(x) = ( SiLU(x·W_gate) ⊙ (x·W_up) ) · W_down　　SiLU(x)=x·σ(x)</text>
<text x="780.0" y="614" text-anchor="middle" class="cap">三个矩阵（比老式 FFN 多一个）；把 d_ff 收到约 8/3×d_model，总参数量与老式 4× 两矩阵 FFN 持平。</text>
</svg>
