<rect x="406.0" y="518" width="108.0" height="24" rx="7" fill="#ffedd5" stroke="#ea580c" stroke-width="1.3"/>
<text x="460.0" y="534.5" text-anchor="middle" class="tag" fill="#ea580c">② FFN 子层</text>
<rect x="390.0" y="882" width="720" height="64" rx="10" fill="#f3f4f6" stroke="#94a3b8" stroke-width="1.4"/>
<text x="750.0" y="910" text-anchor="middle" class="mono">① x' = x + MHA(Norm(x))</text>
