<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 500" width="1020" height="500" font-family="'Noto Sans CJK SC', 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1020" height="500" fill="#ffffff"/>
  <text x="510" y="44" font-size="24" font-weight="600" fill="#374151" text-anchor="middle">warmup + cosine：LLM 训练的事实默认 lr 调度</text>

  <!-- Plot frame -->
  <g transform="translate(90,90)">
    <!-- axes -->
    <line x1="0" y1="290" x2="840" y2="290" stroke="#374151" stroke-width="1.5"/>
    <line x1="0" y1="0"   x2="0"   y2="290" stroke="#374151" stroke-width="1.5"/>

    <!-- grid -->
    <g stroke="#e5e7eb" stroke-width="1">
      <line x1="0" y1="42"  x2="840" y2="42"/>
      <line x1="0" y1="126" x2="840" y2="126"/>
      <line x1="0" y1="210" x2="840" y2="210"/>
    </g>

    <!-- y axis labels -->
    <text x="-10" y="46"  font-size="14" fill="#374151" text-anchor="end">η_max</text>
    <text x="-10" y="130" font-size="14" fill="#374151" text-anchor="end">0.5·η_max</text>
    <text x="-10" y="214" font-size="14" fill="#374151" text-anchor="end">η_min</text>
    <text x="-10" y="294" font-size="14" fill="#374151" text-anchor="end">0</text>

    <!-- y axis title -->
    <text x="0" y="-14" font-size="14" fill="#374151" text-anchor="start">learning rate</text>

    <!-- x axis labels -->
    <text x="0"   y="316" font-size="14" fill="#374151" text-anchor="middle">0</text>
    <text x="126" y="316" font-size="14" fill="#374151" text-anchor="middle">T_w</text>
    <text x="840" y="316" font-size="14" fill="#374151" text-anchor="middle">T</text>
    <text x="420" y="340" font-size="15" fill="#374151" text-anchor="middle">training step</text>

    <!-- warmup region shading -->
    <rect x="0" y="0" width="126" height="290" fill="#fef3c7" opacity="0.55"/>
    <!-- cosine region shading -->
    <rect x="126" y="0" width="714" height="290" fill="#dbeafe" opacity="0.45"/>

    <!-- warmup line: linear from (0,290) to (126,42) -->
    <line x1="0" y1="290" x2="126" y2="42" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>

    <!-- cosine curve: from (126, 42) to (840, 210) -->
    <path d="M 126 42 C 262 42, 336 84, 483 126 S 735 210, 840 210" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>

    <!-- floor line at η_min -->
    <line x1="126" y1="210" x2="840" y2="210" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- peak marker -->
    <circle cx="126" cy="42" r="5" fill="#ef4444"/>
    <text x="142" y="36" font-size="14" fill="#b91c1c" font-weight="600">peak η_max</text>

    <!-- end marker -->
    <circle cx="840" cy="210" r="5" fill="#0ea5e9"/>
    <text x="824" y="234" font-size="14" fill="#0369a1" text-anchor="end">η_min ≈ 10% η_max</text>

    <!-- region labels -->
    <text x="63"  y="24" font-size="14" fill="#92400e" text-anchor="middle" font-weight="600">warmup</text>
    <text x="63"  y="44" font-size="13" fill="#92400e" text-anchor="middle">linear ramp</text>
    <text x="483" y="24" font-size="14" fill="#1e3a8a" text-anchor="middle" font-weight="600">cosine annealing</text>
    <text x="483" y="44" font-size="13" fill="#1e3a8a" text-anchor="middle">η_min + ½(η_max−η_min)·(1+cos(π·(t−T_w)/(T−T_w)))</text>
  </g>
</svg>
