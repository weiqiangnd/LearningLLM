<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1044">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aSlate" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#334155"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 25px; font-weight: 700; fill: #374151; }
    .h2     { font-size: 18px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 14px; font-weight: 600; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 15px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 700; }
  </style>
<text x="720.0" y="48" text-anchor="middle" class="title">Transformer 整体架构全景：从 input_ids 到 logits</text>
<text x="720.0" y="76" text-anchor="middle" class="cap">以 Qwen3-8B 为标尺 —— 每格标注张量形状的变换与该组件的参数量；B = batch，L = 序列长度，d = 4096</text>
<rect x="90.0" y="121.0" width="320" height="58" rx="12" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="250" y="144" text-anchor="middle" class="lbl">input_ids</text>
<text x="250" y="167" text-anchor="middle" class="monob">[B, L]  (int64)</text>
<rect x="90.0" y="222.0" width="320" height="64" rx="12" fill="#f8d3e4" stroke="#c43f86" stroke-width="2"/>
<text x="250" y="248" text-anchor="middle" class="lbl">Token Embedding</text>
<text x="250" y="271" text-anchor="middle" class="monob">[B, L] → [B, L, 4096]</text>
<rect x="424.0" y="232" width="75" height="28" rx="8" fill="#ffffff" stroke="#c43f86" stroke-width="1.6"/>
<text x="461.5" y="251" text-anchor="middle" class="tag" fill="#374151">622 M</text>
<text x="461.5" y="277" text-anchor="middle" class="small">151936×4096</text>
<rect x="66.0" y="305.0" width="368" height="250" rx="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="7,5"/>
<text x="84.0" y="327.0" text-anchor="start" class="h2">Decoder Block × 36</text>
<rect x="90.0" y="340.0" width="320" height="60" rx="12" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="250" y="364" text-anchor="middle" class="lbl">① 注意力子层 (GQA)</text>
<text x="250" y="387" text-anchor="middle" class="monob">[B,L,4096] → [B,L,4096]</text>
<rect x="424.0" y="348" width="75" height="28" rx="8" fill="#ffffff" stroke="#d9760f" stroke-width="1.6"/>
<text x="461.5" y="367" text-anchor="middle" class="tag" fill="#374151">≈42 M</text>
<text x="461.5" y="393" text-anchor="middle" class="small">每层</text>
<text x="250" y="446" text-anchor="middle" class="small">⊕ 残差 · RMSNorm 裹在外面</text>
<rect x="90.0" y="458.0" width="320" height="60" rx="12" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="250" y="482" text-anchor="middle" class="lbl">② FFN 子层 (SwiGLU)</text>
<text x="250" y="505" text-anchor="middle" class="monob">[B,L,4096] → [B,L,4096]</text>
<rect x="424.0" y="466" width="86" height="28" rx="8" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.6"/>
<text x="467.0" y="485" text-anchor="middle" class="tag" fill="#374151">≈151 M</text>
<text x="467.0" y="511" text-anchor="middle" class="small">每层</text>
<text x="250" y="534" text-anchor="middle" class="small">形状守恒 → 可堆叠 36 层</text>
<rect x="90.0" y="579.0" width="320" height="58" rx="12" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="250" y="602" text-anchor="middle" class="lbl">Final RMSNorm</text>
<text x="250" y="625" text-anchor="middle" class="monob">[B, L, 4096]</text>
<rect x="424.0" y="586" width="42" height="28" rx="8" fill="#ffffff" stroke="#b8920a" stroke-width="1.6"/>
<text x="445.0" y="605" text-anchor="middle" class="tag" fill="#374151">~0</text>
<text x="445.0" y="631" text-anchor="middle" class="small">4096</text>
<rect x="90.0" y="678.0" width="320" height="64" rx="12" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="250" y="704" text-anchor="middle" class="lbl">lm_head (Linear)</text>
<text x="250" y="727" text-anchor="middle" class="monob">[B,L,4096] → [B,L,151936]</text>
<rect x="424.0" y="688" width="75" height="28" rx="8" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.6"/>
<text x="461.5" y="707" text-anchor="middle" class="tag" fill="#374151">622 M</text>
<text x="461.5" y="733" text-anchor="middle" class="small">4096×151936</text>
<rect x="90.0" y="793.0" width="320" height="58" rx="12" fill="#cdebd0" stroke="#2f9d52" stroke-width="2"/>
<text x="250" y="816" text-anchor="middle" class="lbl">logits → softmax / 采样</text>
<text x="250" y="839" text-anchor="middle" class="monob">[B, L, 151936]</text>
<text x="250" y="872" text-anchor="middle" class="small">（采样 = 第 2 章 / 训练 = 第 10 章）</text>
<line x1="250" y1="179" x2="250" y2="222" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="250" y1="286" x2="250" y2="305.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="250" y1="555.0" x2="250" y2="579" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="250" y1="637" x2="250" y2="678" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="250" y1="742" x2="250" y2="793" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="250" y1="400" x2="250" y2="454" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="785.0" y="112" width="610" height="706" rx="18" fill="#fcfcfd" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="2,0"/>
<text x="1090" y="142" text-anchor="middle" class="h2">放大一个 Decoder Block</text>
<text x="1090" y="166" text-anchor="middle" class="sub">Pre-LN · RMSNorm · GQA · SwiGLU（Qwen3 每一层都长这样）</text>
<line x1="434.0" y1="360" x2="785.0" y2="120" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="4,4"/>
<line x1="434.0" y1="500" x2="785.0" y2="810" stroke="#7c3aed" stroke-width="1.6" stroke-dasharray="4,4"/>
<text x="1090" y="198" text-anchor="middle" class="monob">输入  x : [B, L, 4096]</text>
<rect x="855.0" y="229.0" width="470" height="46" rx="10" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="1090" y="257" text-anchor="middle" class="lbl">RMSNorm₁</text>
<rect x="1253.0" y="238.0" width="62" height="28" rx="8" fill="#ffffff" stroke="#b8920a" stroke-width="1.6"/>
<text x="1284.0" y="257.0" text-anchor="middle" class="tag" fill="#374151">4096</text>
<rect x="855.0" y="288.0" width="470" height="156" rx="10" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="1090" y="314.0" text-anchor="middle" class="lbl">Grouped-Query Attention</text>
<text x="1090" y="336.0" text-anchor="middle" class="sub">32 Q头 · 8 KV头 · d_k=128 · 含 RoPE</text>
<text x="1090" y="362.0" text-anchor="middle" class="mono">q:4096→4096  k,v:4096→1024  o:4096→4096</text>
<text x="1090" y="386.0" text-anchor="middle" class="mono">[B,L,4096]→[B,32,L,128]→softmax(QKᵀ/√d_k)·V</text>
<text x="1090" y="408.0" text-anchor="middle" class="mono">→ 合并 → o_proj → [B,L,4096]</text>
<rect x="1246.0" y="414.0" width="70" height="28" rx="8" fill="#ffffff" stroke="#d9760f" stroke-width="1.6"/>
<text x="1281.0" y="433.0" text-anchor="middle" class="tag" fill="#374151">≈42 M</text>
<circle cx="1090" cy="478.0" r="17" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="1090" y="485.0" text-anchor="middle" class="title" font-size="22">+</text>
<text x="1116" y="483.0" text-anchor="start" class="small">残差</text>
<line x1="1090" y1="208" x2="1090" y2="229" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1090" y1="275" x2="1090" y2="286.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1090" y1="444.0" x2="1090" y2="461.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="855.0" y="507.0" width="470" height="46" rx="10" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="1090" y="535.0" text-anchor="middle" class="lbl">RMSNorm₂</text>
<rect x="1253.0" y="516.0" width="62" height="28" rx="8" fill="#ffffff" stroke="#b8920a" stroke-width="1.6"/>
<text x="1284.0" y="535.0" text-anchor="middle" class="tag" fill="#374151">4096</text>
<rect x="855.0" y="579.0" width="470" height="134" rx="10" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="1090" y="605.0" text-anchor="middle" class="lbl">SwiGLU FFN</text>
<text x="1090" y="627.0" text-anchor="middle" class="sub">SiLU(gate) ⊙ up，再降维</text>
<text x="1090" y="653.0" text-anchor="middle" class="mono">gate,up:4096→12288  down:12288→4096</text>
<text x="1090" y="677.0" text-anchor="middle" class="mono">[B,L,4096]→[B,L,12288]→[B,L,4096]</text>
<rect x="1241.0" y="683.0" width="80" height="28" rx="8" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.6"/>
<text x="1281.0" y="702.0" text-anchor="middle" class="tag" fill="#374151">≈151 M</text>
<circle cx="1090" cy="747.0" r="17" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="1090" y="754.0" text-anchor="middle" class="title" font-size="22">+</text>
<text x="1116" y="752.0" text-anchor="start" class="small">残差</text>
<line x1="1090" y1="495.0" x2="1090" y2="507.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1090" y1="553.0" x2="1090" y2="577.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1090" y1="713.0" x2="1090" y2="730.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<text x="1090" y="787.0" text-anchor="middle" class="monob">输出  out : [B, L, 4096]   —— 与输入同形，可堆叠</text>
<path d="M 980 208 L 815.0 208 L 815.0 478.0 L 1073 478.0" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="809.0" y="343.0" text-anchor="end" class="small" fill="#059669">残差旁路</text>
<path d="M 980 495.0 L 815.0 495.0 L 815.0 747.0 L 1073 747.0" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="250" y="904" text-anchor="middle" class="h2">参数账（Qwen3-8B，未绑定权重）</text>
<rect x="70" y="926" width="188" height="70" rx="10" fill="#ffffff" stroke="#c43f86" stroke-width="1.8"/>
<text x="164.0" y="951" text-anchor="middle" class="sub">Token Embedding</text>
<text x="164.0" y="980" text-anchor="middle" class="lbl">622 M</text>
<text x="271.0" y="966" text-anchor="middle" class="title" font-size="22">+</text>
<rect x="284" y="926" width="188" height="70" rx="10" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.8"/>
<text x="378.0" y="951" text-anchor="middle" class="sub">36 × Decoder Block</text>
<text x="378.0" y="980" text-anchor="middle" class="lbl">6.95 B</text>
<text x="485.0" y="966" text-anchor="middle" class="title" font-size="22">+</text>
<rect x="498" y="926" width="188" height="70" rx="10" fill="#ffffff" stroke="#b8920a" stroke-width="1.8"/>
<text x="592.0" y="951" text-anchor="middle" class="sub">Final RMSNorm</text>
<text x="592.0" y="980" text-anchor="middle" class="lbl">~0</text>
<text x="699.0" y="966" text-anchor="middle" class="title" font-size="22">+</text>
<rect x="712" y="926" width="188" height="70" rx="10" fill="#ffffff" stroke="#2f6fd0" stroke-width="1.8"/>
<text x="806.0" y="951" text-anchor="middle" class="sub">lm_head</text>
<text x="806.0" y="980" text-anchor="middle" class="lbl">622 M</text>
<text x="954" y="966" text-anchor="middle" class="title" font-size="22">=</text>
<rect x="998.0" y="947" width="160" height="28" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.6"/>
<text x="1078" y="966" text-anchor="middle" class="tag" fill="#374151">≈ 8.2 B 参数</text>
<text x="74" y="1020" text-anchor="start" class="small">一个 block 里 FFN 约占 3/4 参数（151M / 193M）；整模型里 36 层的 block 堆叠占了大头。</text>
</svg>
