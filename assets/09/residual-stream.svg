<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 1000">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aSlate" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#334155"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 25px; font-weight: 700; fill: #374151; }
    .h2     { font-size: 18px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 14px; font-weight: 600; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 15px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 700; }
  </style>
<text x="630.0" y="46" text-anchor="middle" class="title">残差流（residual stream）视角：贯穿所有层的主干总线</text>
<text x="630.0" y="74" text-anchor="middle" class="cap">每个子层只「读取流的当前态 → 算一个增量 Δ → 加回去」，流本身从不被改写、只被累加</text>
<line x1="440" y1="902" x2="440" y2="150" stroke="#2563eb" stroke-width="14" stroke-linecap="round" opacity="0.30"/>
<line x1="440" y1="902" x2="440" y2="144" stroke="#2563eb" stroke-width="2.5" marker-end="url(#aBlue)"/>
<text x="412" y="300" text-anchor="middle" class="lbl" transform="rotate(-90 412 300)" fill="#2563eb">残差流  [B, L, d=4096]</text>
<rect x="290" y="898" width="300" height="52" rx="10" fill="#f8d3e4" stroke="#c43f86" stroke-width="2"/>
<text x="440" y="920" text-anchor="middle" class="lbl">Token Embedding</text>
<text x="440" y="940" text-anchor="middle" class="small">把初始向量写上流</text>
<text x="590" y="250" text-anchor="middle" class="sub">↑ 每层把自己的 Δ 累加到流上，逐层精炼</text>
<text x="272" y="770" text-anchor="end" class="h2">层 1</text>
<line x1="448" y1="798" x2="503.0" y2="798" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="505.0" y="784.0" width="290" height="62" rx="10" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="650" y="811" text-anchor="middle" class="lbl">RMSNorm → Attention</text>
<text x="650" y="831" text-anchor="middle" class="small">跨 token 混合信息</text>
<circle cx="440" cy="832" r="15" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="440" y="838" text-anchor="middle" class="title" font-size="19">+</text>
<path d="M 503.0 832 L 455 832" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="480.0" y="820" text-anchor="middle" class="small" fill="#059669" font-weight="600">Δ_attn</text>
<line x1="448" y1="708" x2="503.0" y2="708" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="505.0" y="694.0" width="290" height="62" rx="10" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="650" y="721" text-anchor="middle" class="lbl">RMSNorm → FFN</text>
<text x="650" y="741" text-anchor="middle" class="small">逐 token 非线性深加工</text>
<circle cx="440" cy="742" r="15" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="440" y="748" text-anchor="middle" class="title" font-size="19">+</text>
<path d="M 503.0 742 L 455 742" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="480.0" y="730" text-anchor="middle" class="small" fill="#059669" font-weight="600">Δ_ffn</text>
<text x="272" y="560" text-anchor="end" class="h2">层 2</text>
<line x1="448" y1="588" x2="503.0" y2="588" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="505.0" y="574.0" width="290" height="62" rx="10" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="650" y="601" text-anchor="middle" class="lbl">RMSNorm → Attention</text>
<text x="650" y="621" text-anchor="middle" class="small">跨 token 混合信息</text>
<circle cx="440" cy="622" r="15" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="440" y="628" text-anchor="middle" class="title" font-size="19">+</text>
<path d="M 503.0 622 L 455 622" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="480.0" y="610" text-anchor="middle" class="small" fill="#059669" font-weight="600">Δ_attn</text>
<line x1="448" y1="498" x2="503.0" y2="498" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="505.0" y="484.0" width="290" height="62" rx="10" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="650" y="511" text-anchor="middle" class="lbl">RMSNorm → FFN</text>
<text x="650" y="531" text-anchor="middle" class="small">逐 token 非线性深加工</text>
<circle cx="440" cy="532" r="15" fill="#ffffff" stroke="#334155" stroke-width="2"/>
<text x="440" y="538" text-anchor="middle" class="title" font-size="19">+</text>
<path d="M 503.0 532 L 455 532" fill="none" stroke="#059669" stroke-width="2.4" marker-end="url(#aGreen)"/>
<text x="480.0" y="520" text-anchor="middle" class="small" fill="#059669" font-weight="600">Δ_ffn</text>
<text x="440" y="458" text-anchor="middle" class="title" font-size="34">⋮</text>
<text x="650" y="458" text-anchor="middle" class="sub">（第 3 … 36 层同理：读流 → 算 Δ → 加回）</text>
<line x1="440" y1="430" x2="440" y2="214" stroke="#2563eb" stroke-width="2.2" marker-end="url(#aBlue)"/>
<rect x="265" y="154" width="350" height="54" rx="10" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="440" y="176" text-anchor="middle" class="lbl">Final RMSNorm → lm_head</text>
<text x="440" y="196" text-anchor="middle" class="small">读取流的末态 → 词表 logits</text>
<rect x="900" y="150" width="330" height="760" rx="14" fill="#fbfbfc" stroke="#7c3aed" stroke-width="1.5"/>
<text x="1065" y="190" text-anchor="middle" class="h2">为什么这个视角好用</text>
<circle cx="924" cy="240" r="5" fill="#7c3aed"/>
<text x="940" y="244" text-anchor="start" class="lbl">流 = 模型的「工作内存」</text>
<text x="940" y="267" text-anchor="start" class="small">所有层共享同一条 d 维总线，</text>
<text x="940" y="289" text-anchor="start" class="small">信息在上面一路传递、逐步精炼。</text>
<circle cx="924" cy="378" r="5" fill="#7c3aed"/>
<text x="940" y="382" text-anchor="start" class="lbl">子层只做加法</text>
<text x="940" y="405" text-anchor="start" class="small">Attention / FFN 算出的不是成品，</text>
<text x="940" y="427" text-anchor="start" class="small">而是一个增量 Δ，加到流上即可。</text>
<circle cx="924" cy="516" r="5" fill="#7c3aed"/>
<text x="940" y="520" text-anchor="start" class="lbl">梯度直通</text>
<text x="940" y="543" text-anchor="start" class="small">因为是「加」，反传时残差那条</text>
<text x="940" y="565" text-anchor="start" class="small">路导数恒为 1 —— 第 8 章的高速公路。</text>
<circle cx="924" cy="654" r="5" fill="#7c3aed"/>
<text x="940" y="658" text-anchor="start" class="lbl">读写都过 Norm</text>
<text x="940" y="681" text-anchor="start" class="small">Pre-LN 下，子层读流时先 Norm，</text>
<text x="940" y="703" text-anchor="start" class="small">但写回流的是未归一化的 Δ。</text>
<circle cx="924" cy="792" r="5" fill="#7c3aed"/>
<text x="940" y="796" text-anchor="start" class="lbl">末端一次读出</text>
<text x="940" y="819" text-anchor="start" class="small">Final Norm + lm_head 只在最后</text>
<text x="940" y="841" text-anchor="start" class="small">读流的末态，映射到词表。</text>
</svg>
