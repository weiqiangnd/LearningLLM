<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 960">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aSlate" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#334155"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 25px; font-weight: 700; fill: #374151; }
    .h2     { font-size: 18px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 14px; font-weight: 600; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 15px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 700; }
  </style>
<text x="740.0" y="46" text-anchor="middle" class="title">Encoder-Decoder：原始 Transformer 的两栈结构（Vaswani 2017）</text>
<text x="740.0" y="74" text-anchor="middle" class="cap">三种注意力各司其职：encoder 双向自注意力 · decoder 掩码自注意力 · cross-attention 把两栈接起来</text>
<rect x="160.0" y="787.0" width="360" height="50" rx="11" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="340" y="807" text-anchor="middle" class="lbl">源序列  x₁ … xₙ</text>
<text x="340" y="829" text-anchor="middle" class="sub">（待翻译 / 待理解的输入）</text>
<rect x="160.0" y="692.0" width="360" height="56" rx="11" fill="#f8d3e4" stroke="#c43f86" stroke-width="2"/>
<text x="340" y="715" text-anchor="middle" class="lbl">Input Embedding + 位置编码</text>
<text x="340" y="737" text-anchor="middle" class="sub">[B, Lₛ, d]</text>
<rect x="138.0" y="365.0" width="404" height="226" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="7,5"/>
<text x="126.0" y="478" text-anchor="end" class="title" font-size="20">N×</text>
<rect x="160.0" y="501.0" width="360" height="62" rx="11" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="340" y="527" text-anchor="middle" class="lbl">双向 Self-Attention</text>
<text x="340" y="549" text-anchor="middle" class="sub">每个 token 看全句（无掩码）</text>
<rect x="160.0" y="395.0" width="360" height="58" rx="11" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="340" y="419" text-anchor="middle" class="lbl">Feed-Forward (FFN)</text>
<text x="340" y="441" text-anchor="middle" class="sub">Add &amp; Norm 裹在每个子层外</text>
<line x1="340" y1="501" x2="340" y2="453" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="160.0" y="222.0" width="360" height="56" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="340" y="245" text-anchor="middle" class="lbl">Encoder 输出（memory）</text>
<text x="340" y="267" text-anchor="middle" class="sub">[B, Lₛ, d] —— 提供 K, V</text>
<text x="340" y="160" text-anchor="middle" class="small">encoder：把整句源文编码成一排上下文向量</text>
<line x1="340" y1="787" x2="340" y2="748" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="340" y1="692" x2="340" y2="591.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="340" y1="365.0" x2="340" y2="278" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="820.0" y="787.0" width="360" height="50" rx="11" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="1000" y="807" text-anchor="middle" class="lbl">目标序列（右移）</text>
<text x="1000" y="829" text-anchor="middle" class="sub">&lt;bos&gt; y₁ … y_{t-1}</text>
<rect x="820.0" y="692.0" width="360" height="56" rx="11" fill="#f8d3e4" stroke="#c43f86" stroke-width="2"/>
<text x="1000" y="715" text-anchor="middle" class="lbl">Output Embedding + 位置编码</text>
<text x="1000" y="737" text-anchor="middle" class="sub">[B, Lₜ, d]</text>
<rect x="798.0" y="305.0" width="404" height="326" rx="15" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="7,5"/>
<text x="1214.0" y="468" text-anchor="start" class="title" font-size="20">N×</text>
<rect x="820.0" y="544.0" width="360" height="60" rx="11" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="1000" y="569" text-anchor="middle" class="lbl">Masked Self-Attention</text>
<text x="1000" y="591" text-anchor="middle" class="sub">因果掩码：只看已生成的左侧</text>
<rect x="820.0" y="438.0" width="360" height="60" rx="11" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="1000" y="463" text-anchor="middle" class="lbl">Cross-Attention</text>
<text x="1000" y="485" text-anchor="middle" class="sub">Q 来自 decoder，K/V 来自 encoder</text>
<rect x="820.0" y="333.0" width="360" height="58" rx="11" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="1000" y="357" text-anchor="middle" class="lbl">Feed-Forward (FFN)</text>
<text x="1000" y="379" text-anchor="middle" class="sub">Add &amp; Norm 裹在每个子层外</text>
<line x1="1000" y1="544" x2="1000" y2="498" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1000" y1="438" x2="1000" y2="391" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<rect x="820.0" y="225.0" width="360" height="50" rx="11" fill="#cfe0fb" stroke="#2f6fd0" stroke-width="2"/>
<text x="1000" y="245" text-anchor="middle" class="lbl">Linear</text>
<text x="1000" y="267" text-anchor="middle" class="sub">d → 词表 V</text>
<rect x="820.0" y="143.0" width="360" height="50" rx="11" fill="#cdebd0" stroke="#2f9d52" stroke-width="2"/>
<text x="1000" y="163" text-anchor="middle" class="lbl">Softmax → 输出概率</text>
<text x="1000" y="185" text-anchor="middle" class="sub">预测下一个目标 token</text>
<line x1="1000" y1="787" x2="1000" y2="748" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1000" y1="692" x2="1000" y2="631.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1000" y1="305.0" x2="1000" y2="275" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1000" y1="225" x2="1000" y2="193" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<path d="M 520.0 250 C 670.0 250, 670.0 468, 816.0 468" fill="none" stroke="#dc2626" stroke-width="2.6" stroke-dasharray="2,0" marker-end="url(#aRed)"/>
<text x="670.0" y="234" text-anchor="middle" class="small" fill="#dc2626" font-weight="600">K, V（来自 encoder）</text>
<text x="670.0" y="530" text-anchor="middle" class="small" fill="#dc2626">cross-attention：decoder 每个位置都能看 encoder 的全部输出</text>
<rect x="70" y="880" width="1340" height="56" rx="12" fill="#fbfbfc" stroke="#94a3b8" stroke-width="1.2"/>
<rect x="110.0" y="898" width="18" height="18" rx="4" fill="#ffffff" stroke="#d9760f" stroke-width="2.4"/>
<text x="138.0" y="906" text-anchor="start" class="lbl">双向自注意力</text>
<text x="138.0" y="926" text-anchor="start" class="small">encoder 内，token 互看全句</text>
<rect x="536.6666666666667" y="898" width="18" height="18" rx="4" fill="#ffffff" stroke="#d9760f" stroke-width="2.4"/>
<text x="564.6666666666667" y="906" text-anchor="start" class="lbl">掩码自注意力</text>
<text x="564.6666666666667" y="926" text-anchor="start" class="small">decoder 内，只看左侧（因果）</text>
<rect x="963.3333333333334" y="898" width="18" height="18" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="2.4"/>
<text x="991.3333333333334" y="906" text-anchor="start" class="lbl">cross-attention</text>
<text x="991.3333333333334" y="926" text-anchor="start" class="small">decoder 看 encoder：Q↓ / K,V←</text>
</svg>
