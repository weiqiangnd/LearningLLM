<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 820">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aSlate" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#334155"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 25px; font-weight: 700; fill: #374151; }
    .h2     { font-size: 18px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monob  { font-size: 14px; font-weight: 600; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 15px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 700; }
  </style>
<text x="710.0" y="46" text-anchor="middle" class="title">Pre-LN vs Post-LN：归一化放在子层「前」还是「后」</text>
<text x="710.0" y="74" text-anchor="middle" class="cap">差别只挪了一个 Norm，却决定了深层 Transformer 训不训得稳</text>
<rect x="60" y="96" width="600" height="640" rx="16" fill="#fcfcfd" stroke="#ea580c" stroke-width="1.8"/>
<text x="360" y="130" text-anchor="middle" class="h2" fill="#ea580c">Post-LN（原版 2017）</text>
<rect x="210" y="168.0" width="300" height="56" rx="10" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="360" y="192" text-anchor="middle" class="lbl">输入 x</text>
<text x="360" y="213" text-anchor="middle" class="small">[B, L, d]</text>
<rect x="210" y="264.0" width="300" height="56" rx="10" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="360" y="288" text-anchor="middle" class="lbl">Sublayer</text>
<text x="360" y="309" text-anchor="middle" class="small">Attention / FFN</text>
<circle cx="360" cy="388" r="20" fill="#ffffff" stroke="#334155" stroke-width="2.2"/>
<text x="360" y="396" text-anchor="middle" class="title" font-size="24">+</text>
<rect x="210" y="440.0" width="300" height="56" rx="10" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="360" y="464" text-anchor="middle" class="lbl">LayerNorm</text>
<text x="360" y="485" text-anchor="middle" class="small">在主干上归一化</text>
<rect x="210" y="536.0" width="300" height="56" rx="10" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="360" y="560" text-anchor="middle" class="lbl">输出</text>
<text x="360" y="581" text-anchor="middle" class="small">送入下一层</text>
<line x1="360" y1="224.0" x2="360" y2="262.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="360" y1="320.0" x2="360" y2="366" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="360" y1="408" x2="360" y2="438.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="360" y1="496.0" x2="360" y2="534.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<path d="M 510 196 L 590 196 L 590 388 L 380 388" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#aSlate)"/>
<text x="598" y="284.0" text-anchor="start" class="small" fill="#334155" font-weight="600">残差先汇合</text>
<text x="598" y="302.0" text-anchor="start" class="small" fill="#334155" font-weight="600">再被 Norm 重整</text>
<rect x="90" y="612" width="540" height="40" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.4"/>
<text x="360" y="638" text-anchor="middle" class="monob">out = LayerNorm( x + Sublayer(x) )</text>
<text x="360" y="676" text-anchor="middle" class="sub">Norm 压在残差汇合之后的主干上，</text>
<text x="360" y="700" text-anchor="middle" class="sub">残差幅度被反复重整 → 深层梯度不稳，</text>
<text x="360" y="724" text-anchor="middle" class="sub">必须靠 warmup 小步起步、细心调。</text>
<rect x="760" y="96" width="600" height="640" rx="16" fill="#fcfcfd" stroke="#059669" stroke-width="1.8"/>
<text x="1060" y="130" text-anchor="middle" class="h2" fill="#059669">Pre-LN（现代默认）</text>
<rect x="910" y="168.0" width="300" height="56" rx="10" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="1060" y="192" text-anchor="middle" class="lbl">输入 x</text>
<text x="1060" y="213" text-anchor="middle" class="small">[B, L, d]</text>
<rect x="910" y="264.0" width="300" height="56" rx="10" fill="#fdeeb3" stroke="#b8920a" stroke-width="2"/>
<text x="1060" y="288" text-anchor="middle" class="lbl">LayerNorm / RMSNorm</text>
<text x="1060" y="309" text-anchor="middle" class="small">只归一化「读进子层的副本」</text>
<rect x="910" y="360.0" width="300" height="56" rx="10" fill="#fbe1c4" stroke="#d9760f" stroke-width="2"/>
<text x="1060" y="384" text-anchor="middle" class="lbl">Sublayer</text>
<text x="1060" y="405" text-anchor="middle" class="small">Attention / FFN</text>
<circle cx="1060" cy="484" r="20" fill="#ffffff" stroke="#334155" stroke-width="2.2"/>
<text x="1060" y="492" text-anchor="middle" class="title" font-size="24">+</text>
<rect x="910" y="536.0" width="300" height="56" rx="10" fill="#eef1f4" stroke="#7c8896" stroke-width="2"/>
<text x="1060" y="560" text-anchor="middle" class="lbl">输出</text>
<text x="1060" y="581" text-anchor="middle" class="small">送入下一层</text>
<line x1="1060" y1="224.0" x2="1060" y2="262.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1060" y1="320.0" x2="1060" y2="358.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1060" y1="416.0" x2="1060" y2="462" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<line x1="1060" y1="504" x2="1060" y2="534.0" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#aGray)"/>
<path d="M 910 196 L 830 196 L 830 484 L 1040 484" fill="none" stroke="#059669" stroke-width="3.2" marker-end="url(#aGreen)"/>
<text x="822" y="332.0" text-anchor="end" class="small" fill="#059669" font-weight="600">干净的恒等</text>
<text x="822" y="350.0" text-anchor="end" class="small" fill="#059669" font-weight="600">残差高速公路</text>
<rect x="790" y="612" width="540" height="40" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.4"/>
<text x="1060" y="638" text-anchor="middle" class="monob">out = x + Sublayer( Norm(x) )</text>
<text x="1060" y="676" text-anchor="middle" class="sub">残差是一条没有 Norm 挡路的恒等高速公路，</text>
<text x="1060" y="700" text-anchor="middle" class="sub">梯度从顶层直达底层、幅度稳，</text>
<text x="1060" y="724" text-anchor="middle" class="sub">训练稳得多，warmup 可短可免。</text>
<text x="710.0" y="778" text-anchor="middle" class="cap">一句话：Pre-LN 把残差留成干净直通路，所以成了现代 LLM（GPT-2 起 / LLaMA / Qwen）的默认；Post-LN 表达力略强但难训，要靠 DeepNorm、warmup 等手段稳住。</text>
</svg>
