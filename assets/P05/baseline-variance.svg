<text x="480.0" y="450" text-anchor="middle" class="formula">E[ ∇log π · (G − b) ] = E[ ∇log π · G ]　（b 不依赖 a → 期望不变）</text>
<text x="480.0" y="472" text-anchor="middle" class="small">但 Var[ G − b ] 比 Var[ G ] 小很多，梯度估计噪声更低，收敛更稳。最优 b 是 V^π(s)（actor-critic 的来历）。</text>
