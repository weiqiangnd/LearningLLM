<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" font-family="'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="960" height="580" fill="#ffffff"/>
  <text x="480" y="38" font-size="22" font-weight="600" fill="#111827" text-anchor="middle">RL 交互闭环 + 把它映射到 LLM 对齐</text>
  <text x="480" y="60" font-size="13" fill="#6b7280" text-anchor="middle">左：经典 agent–environment 循环；右：每一项在 RLHF / GRPO 里对应什么</text>

  <!-- LEFT PANEL: classic RL loop -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="430" height="430" rx="12" fill="#fafafa" stroke="#e5e7eb"/>
    <text x="215" y="26" text-anchor="middle" font-size="15" fill="#111827" font-weight="600">经典 RL 交互</text>

    <g filter="url(#shadowSoft)">
      <rect x="50"  y="80" width="140" height="80" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <rect x="240" y="80" width="140" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    </g>
    <text x="120" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">Agent</text>
    <text x="120" y="132" text-anchor="middle" font-size="12" fill="#1e3a8a">policy π_θ(a|s)</text>
    <text x="120" y="148" text-anchor="middle" font-size="11" fill="#475569">输入 s → 输出 a 的分布</text>

    <text x="310" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#92400e">Environment</text>
    <text x="310" y="132" text-anchor="middle" font-size="12" fill="#92400e">P(s'|s,a), R(s,a)</text>
    <text x="310" y="148" text-anchor="middle" font-size="11" fill="#475569">转移概率 + 奖励函数</text>

    <!-- arrows: agent → env (action a_t) -->
    <path d="M 190 105 C 220 95, 220 95, 240 105" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowA)"/>
    <text x="215" y="86" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="600">action a_t</text>

    <!-- arrows: env → agent (state s_{t+1}) -->
    <path d="M 240 145 C 220 165, 220 165, 190 145" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="215" y="178" text-anchor="middle" font-size="12" fill="#10b981" font-weight="600">next state s_{t+1}</text>

    <!-- reward arrow (curved beneath) -->
    <path d="M 310 160 C 310 230, 120 230, 120 160" fill="none" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowC)" stroke-dasharray="6 4"/>
    <text x="215" y="248" text-anchor="middle" font-size="12" fill="#c2410c" font-weight="600">reward r_t</text>

    <!-- trajectory note -->
    <g transform="translate(20, 280)">
      <text x="0" y="0" font-size="13" fill="#111827" font-weight="600">轨迹 τ</text>
      <text x="0" y="20" font-size="12" fill="#374151">(s₀, a₀, r₀, s₁, a₁, r₁, …, s_{T-1}, a_{T-1}, r_{T-1}, s_T)</text>
      <text x="0" y="44" font-size="13" fill="#111827" font-weight="600">目标</text>
      <text x="0" y="64" font-size="12" fill="#374151">J(θ) = E_{τ ~ π_θ}[ Σ γ^t r_t ]</text>
      <text x="0" y="86" font-size="13" fill="#111827" font-weight="600">策略梯度</text>
      <text x="0" y="106" font-size="12" fill="#374151">∇J = E_τ[ Σ_t ∇ log π_θ(a_t|s_t) · G_t ]</text>
      <text x="0" y="126" font-size="11" fill="#6b7280">REINFORCE 直接拿 G_t 当权重；PPO/GRPO 把 G_t 换成 advantage A_t</text>
    </g>
  </g>

  <!-- RIGHT PANEL: LLM mapping -->
  <g transform="translate(490, 100)">
    <rect x="0" y="0" width="430" height="430" rx="12" fill="#fafafa" stroke="#e5e7eb"/>
    <text x="215" y="26" text-anchor="middle" font-size="15" fill="#111827" font-weight="600">映射到 LLM 对齐（RLHF / GRPO）</text>

    <g filter="url(#shadowSoft)">
      <rect x="50"  y="80" width="140" height="80" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
      <rect x="240" y="80" width="140" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    </g>
    <text x="120" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#5b21b6">LLM π_θ</text>
    <text x="120" y="132" text-anchor="middle" font-size="12" fill="#5b21b6">prompt+前缀 → 下个 token</text>
    <text x="120" y="148" text-anchor="middle" font-size="11" fill="#475569">softmax over vocab</text>

    <text x="310" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b">RM / 规则</text>
    <text x="310" y="132" text-anchor="middle" font-size="12" fill="#991b1b">奖励来源</text>
    <text x="310" y="148" text-anchor="middle" font-size="11" fill="#475569">人类偏好 RM 或可验证答案</text>

    <!-- token arrow -->
    <path d="M 190 105 C 220 95, 220 95, 240 105" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowA)"/>
    <text x="215" y="86" text-anchor="middle" font-size="12" fill="#7c3aed" font-weight="600">生成 response</text>

    <!-- next state -->
    <path d="M 240 145 C 220 165, 220 165, 190 145" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowB)"/>
    <text x="215" y="178" text-anchor="middle" font-size="11" fill="#10b981">拼接新 token = 新状态</text>

    <!-- reward -->
    <path d="M 310 160 C 310 230, 120 230, 120 160" fill="none" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowC)" stroke-dasharray="6 4"/>
    <text x="215" y="248" text-anchor="middle" font-size="12" fill="#c2410c" font-weight="600">总奖励 r（终止时一次给齐）</text>

    <!-- mapping table -->
    <g transform="translate(20, 280)" font-size="11.5">
      <text x="0" y="0" fill="#111827" font-weight="600">逐项对应</text>
      <text x="0"   y="20" fill="#475569">状态 s_t</text>
      <text x="120" y="20" fill="#374151">= prompt + 已生成 token</text>
      <text x="0"   y="38" fill="#475569">动作 a_t</text>
      <text x="120" y="38" fill="#374151">= 第 t 步的下一个 token</text>
      <text x="0"   y="56" fill="#475569">转移 P</text>
      <text x="120" y="56" fill="#374151">= 确定性"拼接"</text>
      <text x="0"   y="74" fill="#475569">奖励 r_t</text>
      <text x="120" y="74" fill="#374151">= 终止时 RM/规则给一个标量</text>
      <text x="0"   y="92" fill="#475569">折扣 γ</text>
      <text x="120" y="92" fill="#374151">= 1（episode 短，常忽略）</text>
      <text x="0"   y="110" fill="#475569">KL 约束</text>
      <text x="120" y="110" fill="#374151">β · D_KL(π_θ ∥ π_ref) 防跑偏</text>
      <text x="0"   y="128" fill="#475569">advantage</text>
      <text x="120" y="128" fill="#374151">PPO: A = G − V；GRPO: 组内归一化</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 545)">
    <text x="440" y="0" text-anchor="middle" font-size="12" fill="#6b7280">
      RLHF / DPO / GRPO 的训练循环 = 经典 RL 闭环 + 一些"防方差爆炸 / 防策略跑偏"的工程修补
    </text>
  </g>
</svg>
