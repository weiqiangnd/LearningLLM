<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="aGray" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="aPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #374151; }
    .sub   { font-size: 14px; fill: #334155; }
    .lbl   { font-size: 16px; font-weight: 600; fill: #374151; }
    .small { font-size: 13px; fill: #334155; }
    .formula { font-size: 15px; fill: #374151; font-style: italic; }
    .muted { fill: #94a3b8; }
  </style>
<text x="480.0" y="38" text-anchor="middle" class="title">V(s) vs Q(s,a)：两者都从 s 出发，差别在第一步动作怎么决定</text>
<rect x="20" y="80" width="440" height="430" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="240" y="110" text-anchor="middle" class="lbl" fill="#2563eb">V(s)：第一步动作也由 π 决定</text>
<circle cx="240" cy="150" r="26" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="240" y="155" text-anchor="middle" class="lbl">s</text>
<line x1="240" y1="176" x2="100" y2="224" stroke="#334155" stroke-width="1.6"/>
<text x="162.0" y="182.0" text-anchor="end" class="small" fill="#334155">π(a₁|s)=0.5</text>
<circle cx="100" cy="250" r="26" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="100" y="255" text-anchor="middle" class="lbl" fill="#374151">a₁</text>
<line x1="100" y1="276" x2="100" y2="300" stroke="#334155" stroke-width="1.4"/>
<text x="100" y="314" text-anchor="middle" class="small" fill="#334155">按 π 继续走</text>
<text x="100" y="332" text-anchor="middle" class="small" fill="#334155">Q=8</text>
<line x1="240" y1="176" x2="240" y2="224" stroke="#334155" stroke-width="1.6"/>
<text x="250.0" y="192.0" text-anchor="start" class="small" fill="#334155">π(a₂|s)=0.3</text>
<circle cx="240" cy="250" r="26" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="240" y="255" text-anchor="middle" class="lbl" fill="#374151">a₂</text>
<line x1="240" y1="276" x2="240" y2="300" stroke="#334155" stroke-width="1.4"/>
<text x="240" y="314" text-anchor="middle" class="small" fill="#334155">按 π 继续走</text>
<text x="240" y="332" text-anchor="middle" class="small" fill="#334155">Q=5</text>
<line x1="240" y1="176" x2="380" y2="224" stroke="#334155" stroke-width="1.6"/>
<text x="318.0" y="182.0" text-anchor="start" class="small" fill="#334155">π(a₃|s)=0.2</text>
<circle cx="380" cy="250" r="26" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="380" y="255" text-anchor="middle" class="lbl" fill="#374151">a₃</text>
<line x1="380" y1="276" x2="380" y2="300" stroke="#334155" stroke-width="1.4"/>
<text x="380" y="314" text-anchor="middle" class="small" fill="#334155">按 π 继续走</text>
<text x="380" y="332" text-anchor="middle" class="small" fill="#334155">Q=3</text>
<rect x="40" y="420" width="400" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="240" y="442" text-anchor="middle" class="formula">V(s) = Σ π(a|s)·Q(s,a)</text>
<text x="240" y="462" text-anchor="middle" class="small">= 0.5·8 + 0.3·5 + 0.2·3 = 6.1</text>
<rect x="500" y="80" width="440" height="430" rx="14" fill="#ffffff" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="720" y="110" text-anchor="middle" class="lbl" fill="#059669">Q(s, a₂)：第一步锁定 a₂，其余按 π</text>
<circle cx="720" cy="150" r="26" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="720" y="155" text-anchor="middle" class="lbl">s</text>
<line x1="720" y1="176" x2="580" y2="224" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4,3"/>
<text x="642.0" y="182.0" text-anchor="end" class="small" fill="#94a3b8">π(a₁|s)=0.5</text>
<circle cx="580" cy="250" r="26" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="580" y="255" text-anchor="middle" class="lbl" fill="#94a3b8">a₁</text>
<line x1="580" y1="276" x2="580" y2="300" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3"/>
<text x="580" y="314" text-anchor="middle" class="small" fill="#94a3b8">按 π 继续走</text>
<text x="580" y="332" text-anchor="middle" class="small" fill="#94a3b8">Q=8</text>
<line x1="720" y1="176" x2="720" y2="224" stroke="#334155" stroke-width="1.6"/>
<text x="730.0" y="192.0" text-anchor="start" class="small" fill="#334155">π(a₂|s)=0.3</text>
<circle cx="720" cy="250" r="26" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="720" y="255" text-anchor="middle" class="lbl" fill="#374151">a₂</text>
<line x1="720" y1="276" x2="720" y2="300" stroke="#334155" stroke-width="1.4"/>
<text x="720" y="314" text-anchor="middle" class="small" fill="#334155">按 π 继续走</text>
<text x="720" y="332" text-anchor="middle" class="small" fill="#334155">Q=5</text>
<line x1="720" y1="176" x2="860" y2="224" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4,3"/>
<text x="798.0" y="182.0" text-anchor="start" class="small" fill="#94a3b8">π(a₃|s)=0.2</text>
<circle cx="860" cy="250" r="26" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
<text x="860" y="255" text-anchor="middle" class="lbl" fill="#94a3b8">a₃</text>
<line x1="860" y1="276" x2="860" y2="300" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3"/>
<text x="860" y="314" text-anchor="middle" class="small" fill="#94a3b8">按 π 继续走</text>
<text x="860" y="332" text-anchor="middle" class="small" fill="#94a3b8">Q=3</text>
<rect x="520" y="420" width="400" height="48" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
<text x="720" y="442" text-anchor="middle" class="formula">Q(s,a₂) = 5</text>
<text x="720" y="462" text-anchor="middle" class="small">第一步动作锁定为 a₂，之后仍按 π 行动</text>
<text x="480.0" y="535" text-anchor="middle" class="small">相同点：都是「从 s 起，按 π 行动」的累计折扣回报的期望　|　差别：V 对所有动作加权平均，Q 把第一步定住</text>
</svg>
