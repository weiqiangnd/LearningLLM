<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowE" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowGlass" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 13px; font-weight: 700; fill: #2563eb; letter-spacing: 1.4px; }
    .section-sub { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    .node-title { font-size: 18px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 12px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .arrow-label { font-size: 12px; font-weight: 600; fill: #6b7280; }
    .legend { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .footnote { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1080.0" height="720.0" fill="#ffffff"/>
  <text x="540.0" y="56" text-anchor="middle" class="title">4-bit (INT4) 量化流水线：以 8 个权重为例</text>
  <path d="M 300.0,165.0 L 380.0,165.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 660.0,165.0 L 740.0,165.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 880.0,220.0 L 880.0,240.4 L 360.0,299.6 L 360.0,320.0" fill="none" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <path d="M 520.0,375.0 L 600.0,375.0" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowC)"/>
  <path d="M 760.0,430.0 L 760.0,450.4 L 550.0,457.6 L 550.0,478.0" fill="none" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)" stroke-dasharray="6,4"/>
  <rect x="60.0" y="110.0" width="240.0" height="110.0" rx="10.0" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="180.0" y="128.0" text-anchor="middle" class="node-type">INPUT (16 bytes)</text>
  <text x="180.0" y="171.0" text-anchor="middle" class="node-title">BF16 权重块</text>
  <text x="180.0" y="193.0" text-anchor="middle" class="node-sub">W = [0.42, -1.23, 0.78, 1.40, -0.34, 1.05, -0.91, 0.12]</text>
  <rect x="380.0" y="110.0" width="280.0" height="110.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="520.0" y="128.0" text-anchor="middle" class="node-type">CALIBRATION</text>
  <text x="520.0" y="171.0" text-anchor="middle" class="node-title">Step 1 / 2 — 算 absmax 与 scale</text>
  <text x="520.0" y="193.0" text-anchor="middle" class="node-sub">absmax = max|wᵢ| = 1.40    scale = 1.40 / 7 = 0.2</text>
  <rect x="740.0" y="110.0" width="280.0" height="110.0" rx="10.0" fill="#fff7ed" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="880.0" y="128.0" text-anchor="middle" class="node-type">QUANTIZE → INT4</text>
  <text x="880.0" y="171.0" text-anchor="middle" class="node-title">Step 3 — 量化 (round(wᵢ/scale))</text>
  <text x="880.0" y="193.0" text-anchor="middle" class="node-sub">q = [2, -6, 4, 7, -2, 5, -5, 1]    每个 ∈ {-8..7}</text>
  <rect x="200.0" y="320.0" width="320.0" height="110.0" rx="10.0" fill="#faf5ff" stroke="#9333ea" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="360.0" y="338.0" text-anchor="middle" class="node-type">STORAGE (6 bytes ≈ 1/2.7×)</text>
  <text x="360.0" y="381.0" text-anchor="middle" class="node-title">Step 4 — 存储 (落盘 / 显存)</text>
  <text x="360.0" y="403.0" text-anchor="middle" class="node-sub">8 × INT4 (4 B) + 1 × FP16 scale (2 B)</text>
  <rect x="600.0" y="320.0" width="320.0" height="110.0" rx="10.0" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="760.0" y="338.0" text-anchor="middle" class="node-type">DEQUANT  ŵᵢ = qᵢ · scale</text>
  <text x="760.0" y="381.0" text-anchor="middle" class="node-title">Step 5 — 反量化 (推理时)</text>
  <text x="760.0" y="403.0" text-anchor="middle" class="node-sub">ŵ ≈ [0.40, -1.20, 0.80, 1.40, -0.40, 1.00, -1.00, 0.20]</text>
  <rect x="220.0" y="478.0" width="660.0" height="92.0" rx="10.0" fill="#fefce8" stroke="#ca8a04" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="550.0" y="496.0" text-anchor="middle" class="node-type">NF4 + DOUBLE QUANT</text>
  <text x="550.0" y="530.0" text-anchor="middle" class="node-title">工程优化（bitsandbytes 默认）</text>
  <text x="550.0" y="552.0" text-anchor="middle" class="node-sub">NF4：把 16 个量化点放在正态分位数上     双量化：把 scale 再做一次 8-bit 量化，再省 ~0.4 B / 权重</text>
  <rect x="305.0" y="135.0" width="70" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="340.0" y="149.0" text-anchor="middle" class="arrow-label">8 × FP16</text>
  <rect x="675.5" y="135.0" width="49" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="700.0" y="149.0" text-anchor="middle" class="arrow-label">scale</text>
  <rect x="571.0" y="240.0" width="98" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="620.0" y="254.0" text-anchor="middle" class="arrow-label">保存 q + scale</text>
  <rect x="518.0" y="361.0" width="84" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="560.0" y="375.0" text-anchor="middle" class="arrow-label">matmul 前还原</text>
  <rect x="627.0" y="440.0" width="56" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="655.0" y="454.0" text-anchor="middle" class="arrow-label">实际生产配置</text>
  <line x1="42.0" y1="600.0" x2="72.0" y2="600.0" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <text x="82.0" y="604.0" class="legend">原始/中间数据</text>
  <line x1="42.0" y1="622.0" x2="72.0" y2="622.0" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <text x="82.0" y="626.0" class="legend">写入存储</text>
  <line x1="42.0" y1="644.0" x2="72.0" y2="644.0" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowC)"/>
  <text x="82.0" y="648.0" class="legend">推理时读出</text>
  <line x1="42.0" y1="666.0" x2="72.0" y2="666.0" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <text x="82.0" y="670.0" class="legend">工程改良</text>
</svg>