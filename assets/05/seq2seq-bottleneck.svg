<text x="125" y="350" class="small" fill="#dc2626">c 是 decoder 唯一的「源信息」</text>
<rect x="60" y="540" width="1160" height="52" rx="11" fill="#fee2e2" stroke="#dc2626" stroke-width="1.8"/>
<text x="640.0" y="572" text-anchor="middle" class="lbl" fill="#dc2626">瓶颈：无论源句多长，全部信息都得挤进这一个固定大小的 c —— 长句的开头很容易被「冲掉」</text>
<text x="880" y="170" class="small">同一套 RNN 权重</text>
<text x="880" y="190" class="small">在每一步反复使用</text>
