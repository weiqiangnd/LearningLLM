<line x1="204" y1="212" x2="394" y2="212" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<rect x="394.0" y="281.0" width="92" height="46" rx="11" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="440" y="309" text-anchor="middle" class="mono">0.7</text>
<line x1="204" y1="304" x2="394" y2="304" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<rect x="394.0" y="373.0" width="92" height="46" rx="11" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="440" y="401" text-anchor="middle" class="mono">-0.3</text>
<line x1="204" y1="396" x2="394" y2="396" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<path d="M 440 481 L 440 423" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#aGreen)"/>
<text x="454" y="453.0" class="small" fill="#059669">query 和每个 hⱼ 配对打分</text>
<text x="660" y="86" text-anchor="middle" class="lbl" fill="#7c3aed">② softmax</text>
<text x="660" y="106" text-anchor="middle" class="small">αₜⱼ（和为 1）</text>
<line x1="486" y1="120" x2="590" y2="120" stroke="#ea580c" stroke-width="2" marker-end="url(#aOrange)"/>
<rect x="590" y="107" width="26.0" height="26" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
