<rect x="590" y="199" width="107.0" height="26" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
<text x="705.0" y="217" class="monos" fill="#7c3aed">0.66</text>
<line x1="486" y1="304" x2="590" y2="304" stroke="#ea580c" stroke-width="2" marker-end="url(#aOrange)"/>
<rect x="590" y="291" width="32.0" height="26" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
<text x="630.0" y="309" class="monos" fill="#7c3aed">0.16</text>
<line x1="486" y1="396" x2="590" y2="396" stroke="#ea580c" stroke-width="2" marker-end="url(#aOrange)"/>
<rect x="590" y="383" width="17.0" height="26" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
<text x="615.0" y="401" class="monos" fill="#7c3aed">0.06</text>
<text x="980" y="86" text-anchor="middle" class="lbl" fill="#dc2626">③ 加权求和</text>
<text x="980" y="106" text-anchor="middle" class="small">cₜ = Σ αₜⱼ hⱼ</text>
<line x1="755" y1="120" x2="922" y2="258.0" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<line x1="755" y1="212" x2="922" y2="258.0" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<line x1="755" y1="304" x2="922" y2="258.0" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
