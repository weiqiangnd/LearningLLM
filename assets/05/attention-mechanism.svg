<rect x="905.0" y="380.0" width="150" height="56" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="980" y="404.0" text-anchor="middle" class="lbl">yₜ</text>
<text x="980" y="424.0" text-anchor="middle" class="small">本步输出 token</text>
<line x1="980" y1="290.0" x2="980" y2="380.0" stroke="#dc2626" stroke-width="2.2" marker-end="url(#aRed)"/>
<text x="1066" y="353.0" text-anchor="middle" class="small" fill="#334155">cₜ 与 sₜ₋₁</text>
<text x="1066" y="371.0" text-anchor="middle" class="small" fill="#334155">一起生成 yₜ</text>
<rect x="60" y="548" width="1160" height="46" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
<text x="640.0" y="577" text-anchor="middle" class="lbl" fill="#2563eb">关键：cₜ 每一步都不一样 —— 该看源句哪里，由当前 query 和各 hⱼ 的匹配度（注意力权重）动态决定</text>
</svg>
