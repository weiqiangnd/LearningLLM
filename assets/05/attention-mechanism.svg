  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 23px; font-weight: 700; fill: #1e293b; }
    .lbl    { font-size: 15px; font-weight: 600; fill: #1e293b; }
    .sub    { font-size: 13px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; fill: #1e293b; }
    .monos  { font-size: 12px; font-family: 'SFMono-Regular','Consolas','Liberation Mono',monospace; fill: #1e293b; }
    .small  { font-size: 12.5px; fill: #334155; }
    .cap    { font-size: 13.5px; fill: #334155; }
    .tag    { font-size: 12px; font-weight: 600; }
  </style>
<text x="640.0" y="42" text-anchor="middle" class="title">Attention：解码每一步「回看」编码器全部隐藏态，动态算一个 cₜ</text>
<text x="150" y="86" text-anchor="middle" class="lbl" fill="#2563eb">编码器隐藏态</text>
<rect x="96.0" y="94.0" width="108" height="52" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="150" y="116" text-anchor="middle" class="lbl">h₁</text>
<text x="150" y="136" text-anchor="middle" class="small">源位置 1</text>
<rect x="96.0" y="186.0" width="108" height="52" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="150" y="208" text-anchor="middle" class="lbl">h₂</text>
<text x="150" y="228" text-anchor="middle" class="small">源位置 2</text>
<rect x="96.0" y="278.0" width="108" height="52" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="150" y="300" text-anchor="middle" class="lbl">h₃</text>
<text x="150" y="320" text-anchor="middle" class="small">源位置 3</text>
<rect x="96.0" y="370.0" width="108" height="52" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="150" y="392" text-anchor="middle" class="lbl">h₄</text>
<text x="150" y="412" text-anchor="middle" class="small">源位置 4</text>
<rect x="346.0" y="481.0" width="188" height="58" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="440" y="506" text-anchor="middle" class="lbl">sₜ₋₁</text>
<text x="440" y="526" text-anchor="middle" class="small">解码器上一步隐藏 = query</text>
<text x="440" y="470" text-anchor="middle" class="small" fill="#334155">「我现在想生成什么」</text>
<text x="440" y="86" text-anchor="middle" class="lbl" fill="#ea580c">① 打分 eₜⱼ</text>
<text x="440" y="106" text-anchor="middle" class="small">align(sₜ₋₁, hⱼ)</text>
