<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
    <marker id="aTeal" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#0d9488"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 24px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 15px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monos  { font-size: 13px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 14px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 600; }
  </style>
<text x="600.0" y="40" text-anchor="middle" class="title">RoPE：把位置编码成旋转角度 —— 旋转后点积只依赖相对位置 (n − m)</text>
<circle cx="290" cy="285" r="150" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="120" y1="285" x2="460" y2="285" stroke="#94a3b8" stroke-width="1"/>
<line x1="290" y1="455" x2="290" y2="115" stroke="#94a3b8" stroke-width="1"/>
<line x1="290" y1="285" x2="415.1" y2="226.7" stroke="#2563eb" stroke-width="3" marker-end="url(#aB)"/>
<line x1="290" y1="285" x2="337.2" y2="155.3" stroke="#7c3aed" stroke-width="3" marker-end="url(#aP)"/>
<text x="429.0704746110577" y="232.6786798797835" class="lbl" fill="#2563eb">R(mθ)·q</text>
<text x="331.1987797789423" y="143.32241833154464" class="lbl" fill="#7c3aed">R(nθ)·k</text>
<path d="M 353.4,255.4 A 70 70 0 0 0 313.9,219.2" fill="none" stroke="#ea580c" stroke-width="2.5"/>
<text x="320" y="213" class="lbl" fill="#ea580c">(n−m)θ</text>
<text x="290" y="483" text-anchor="middle" class="small">旋转不改长度，只改方向；点积 = 长度 × 夹角余弦</text>
<rect x="600" y="100" width="540" height="180" rx="12" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
<text x="620" y="132" class="lbl" fill="#0d9488">核心恒等式（旋转矩阵性质）</text>
<text x="620" y="170" class="mono">⟨ R(mθ)q , R(nθ)k ⟩</text>
<text x="620" y="202" class="mono">  = qᵀ R((n−m)θ) k</text>
<text x="620" y="240" class="sub">绝对的 m、n 在点积里抵消，</text>
<text x="620" y="262" class="sub">只剩相对位置 (n − m)。</text>
<rect x="600" y="300" width="540" height="190" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
<text x="620" y="330" class="lbl">最小例子：q = k = [1, 0]，θ = 1</text>
<text x="620" y="360" class="mono">(m, n) = (0, 1)</text>
<text x="800" y="360" class="small">距离 1</text>
<text x="875" y="360" class="mono" fill="#059669">cos(1) ≈ 0.540</text>
<text x="620" y="400" class="mono">(m, n) = (5, 6)</text>
<text x="800" y="400" class="small">距离 1</text>
<text x="875" y="400" class="mono" fill="#059669">cos(1) ≈ 0.540</text>
<text x="620" y="440" class="mono">(m, n) = (0, 2)</text>
<text x="800" y="440" class="small">距离 2</text>
<text x="875" y="440" class="mono" fill="#7c3aed">cos(2) ≈ −0.416</text>
<text x="620" y="486" class="sub" font-weight="600">相对距离相同 → 分数相同；距离变了 → 分数才变。</text>
<text x="600.0" y="558" text-anchor="middle" class="cap">d 维时把向量切成 d/2 个二维对，各用角速度 θᵢ = base^(−2i/d) 独立旋转；base（rope_theta）越大，可分辨的最大距离越远（扩上下文的旋钮）。</text>
</svg>
