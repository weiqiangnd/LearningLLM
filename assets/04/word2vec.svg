<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 640">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
    <marker id="aTeal" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#0d9488"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 24px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 15px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 14px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .monos  { font-size: 13px; font-family: 'Noto Sans Mono CJK SC', 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 14px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 600; }
  </style>
<text x="750.0" y="40" text-anchor="middle" class="title">word2vec：用「预测上下文」学词向量 —— CBOW 与 skip-gram</text>
<text x="60" y="88" class="lbl">在句子上开一个滑动窗口（中心词 + 周围词）：</text>
<rect x="90" y="100" width="78" height="40" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<text x="129.0" y="126" text-anchor="middle" class="mono">the</text>
<rect x="182" y="100" width="78" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="221.0" y="126" text-anchor="middle" class="mono">cat</text>
<rect x="274" y="100" width="78" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="313.0" y="126" text-anchor="middle" class="mono">sat</text>
<rect x="366" y="100" width="78" height="40" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="405.0" y="126" text-anchor="middle" class="mono">on</text>
<rect x="458" y="100" width="78" height="40" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<text x="497.0" y="126" text-anchor="middle" class="mono">the</text>
<rect x="550" y="100" width="78" height="40" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.3"/>
<text x="589.0" y="126" text-anchor="middle" class="mono">mat</text>
<rect x="176.0" y="94" width="274.0" height="52" rx="10" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4"/>
<text x="313.0" y="162" text-anchor="middle" class="small" fill="#7c3aed">中心词 sat</text>
<text x="221.0" y="162" text-anchor="middle" class="small" fill="#2563eb">上下文</text>
<text x="405.0" y="162" text-anchor="middle" class="small" fill="#2563eb">上下文</text>
<rect x="60" y="200" width="660" height="280" rx="12" fill="#fbfdff" stroke="#2563eb" stroke-width="2"/>
<text x="84" y="234" class="lbl" fill="#2563eb">CBOW：用上下文预测中心词</text>
<rect x="110.0" y="286.0" width="120" height="48" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="170" y="306" text-anchor="middle" class="lbl">cat</text>
<text x="170" y="326" text-anchor="middle" class="small">上下文</text>
<rect x="110.0" y="361.0" width="120" height="48" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="170" y="381" text-anchor="middle" class="lbl">on</text>
<text x="170" y="401" text-anchor="middle" class="small">上下文</text>
<rect x="315.0" y="315.0" width="150" height="64" rx="11" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2"/>
<text x="390" y="343" text-anchor="middle" class="lbl">投影层</text>
<text x="390" y="363" text-anchor="middle" class="small">查向量 + 求和</text>
<rect x="535.0" y="315.0" width="130" height="64" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="600" y="343" text-anchor="middle" class="lbl">softmax</text>
<text x="600" y="363" text-anchor="middle" class="small">→ 预测 sat</text>
<line x1="230" y1="310" x2="313" y2="335" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<line x1="230" y1="385" x2="313" y2="360" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<line x1="466" y1="347" x2="533" y2="347" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="780" y="200" width="660" height="280" rx="12" fill="#fbfdff" stroke="#7c3aed" stroke-width="2"/>
<text x="804" y="234" class="lbl" fill="#7c3aed">skip-gram：用中心词预测上下文</text>
<rect x="820.0" y="319.0" width="120" height="56" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="880" y="343" text-anchor="middle" class="lbl">sat</text>
<text x="880" y="363" text-anchor="middle" class="small">中心词</text>
<rect x="1025.0" y="315.0" width="150" height="64" rx="11" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2"/>
<text x="1100" y="343" text-anchor="middle" class="lbl">投影层</text>
<text x="1100" y="363" text-anchor="middle" class="small">查向量</text>
<rect x="1255.0" y="286.0" width="130" height="48" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1320" y="315" text-anchor="middle" class="lbl">softmax→cat</text>
<rect x="1255.0" y="361.0" width="130" height="48" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1320" y="390" text-anchor="middle" class="lbl">softmax→on</text>
<line x1="940" y1="347" x2="1023" y2="347" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
<line x1="1176" y1="335" x2="1253" y2="310" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<line x1="1176" y1="360" x2="1253" y2="385" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
<rect x="60" y="510" width="1380" height="100" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
<text x="80" y="538" class="lbl" fill="#059669">关键产物</text>
<text x="80" y="562" class="sub">训练完，「投影层」那张表——每个词一个向量——就是我们要的词向量；语义相近的词，向量自然也相近。</text>
<text x="80" y="592" class="sub">负采样（negative sampling）：词表几十万、softmax 分母太贵 → 改成二分类——真实(中心,上下文)判正 + 随机抽 k 个词判负，便宜得多。</text>
</svg>
