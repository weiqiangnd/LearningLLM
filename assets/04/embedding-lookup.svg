<text x="620.0" y="40" text-anchor="middle" class="title">Token Embedding：查表的本质 —— one-hot × 矩阵 E = 抽出对应那一行</text>
<rect x="45.0" y="145.0" width="150" height="60" rx="11" fill="#f3f4f6" stroke="#94a3b8" stroke-width="2"/>
<text x="120" y="171" text-anchor="middle" class="lbl">token id</text>
<text x="120" y="191" text-anchor="middle" class="small">t = 2</text>
<line x1="196" y1="175" x2="286" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
<text x="316.0" y="83" text-anchor="middle" class="sub">one-hot (V=5)</text>
<rect x="300" y="95" width="32" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
<text x="316.0" y="116" text-anchor="middle" class="monos">0</text>
<text x="288" y="116" text-anchor="end" class="monos" fill="#334155">id 0</text>
<rect x="300" y="127" width="32" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6"/>
<text x="316.0" y="148" text-anchor="middle" class="monos">0</text>
<text x="288" y="148" text-anchor="end" class="monos" fill="#334155">id 1</text>
<rect x="300" y="159" width="32" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.6"/>
