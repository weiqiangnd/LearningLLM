<text x="316.0" y="244" text-anchor="middle" class="monos">0</text>
<text x="288" y="244" text-anchor="end" class="monos" fill="#334155">id 4</text>
<text x="366" y="180" text-anchor="middle" class="title">×</text>
<text x="482.0" y="83" text-anchor="middle" class="sub">embedding 矩阵 E   [V=5, d=4]</text>
<rect x="402" y="95" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="422" y="116" text-anchor="middle" class="monos">.11</text>
