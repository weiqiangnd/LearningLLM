<rect x="442" y="127" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="462" y="148" text-anchor="middle" class="monos">.4</text>
<rect x="482" y="127" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="502" y="148" text-anchor="middle" class="monos">.1</text>
<rect x="522" y="127" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="542" y="148" text-anchor="middle" class="monos">-.1</text>
<rect x="402" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="422" y="180" text-anchor="middle" class="monos">.9</text>
<rect x="442" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="462" y="180" text-anchor="middle" class="monos">-.6</text>
<rect x="482" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="502" y="180" text-anchor="middle" class="monos">.3</text>
<rect x="522" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="542" y="180" text-anchor="middle" class="monos">.7</text>
<rect x="402" y="191" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="422" y="212" text-anchor="middle" class="monos">.0</text>
<rect x="442" y="191" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="462" y="212" text-anchor="middle" class="monos">.2</text>
<rect x="482" y="191" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="502" y="212" text-anchor="middle" class="monos">-.4</text>
<rect x="522" y="191" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="542" y="212" text-anchor="middle" class="monos">.3</text>
<rect x="402" y="223" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="422" y="244" text-anchor="middle" class="monos">-.5</text>
<rect x="442" y="223" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="462" y="244" text-anchor="middle" class="monos">.1</text>
<rect x="482" y="223" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="502" y="244" text-anchor="middle" class="monos">.6</text>
<rect x="522" y="223" width="40" height="32" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
<text x="542" y="244" text-anchor="middle" class="monos">-.2</text>
<text x="576" y="180" class="small" fill="#ea580c">← 第 2 行</text>
<text x="658" y="180" text-anchor="middle" class="title">=</text>
<text x="772" y="83" text-anchor="middle" class="sub">embedding 向量 e_t   [d=4]</text>
<rect x="692" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="712" y="180" text-anchor="middle" class="monos">.9</text>
<rect x="732" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="752" y="180" text-anchor="middle" class="monos">-.6</text>
<rect x="772" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="792" y="180" text-anchor="middle" class="monos">.3</text>
<rect x="812" y="159" width="40" height="32" fill="#ffedd5" stroke="#ea580c" stroke-width="1.8"/>
<text x="832" y="180" text-anchor="middle" class="monos">.7</text>
<text x="772" y="215" text-anchor="middle" class="small" fill="#ea580c">就是 E 的第 2 行</text>
<rect x="60" y="360" width="1120" height="50" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
<text x="620.0" y="391" text-anchor="middle" class="lbl" fill="#2563eb">one-hot 乘矩阵 = 抽出对应行 → 实现上直接「按行号索引（查表）」即可，不必真做大矩阵乘法</text>
<rect x="60" y="445" width="1120" height="92" rx="11" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
<text x="80" y="473" class="lbl">weight tying（权重共享）</text>
<text x="80" y="499" class="sub">输入端 embedding 矩阵 E 形状 [V, d]；输出端 lm_head 形状 [d, V] —— 二者互为转置。</text>
<text x="80" y="521" class="sub">很多模型令 W_out = E^T，让「id→向量」与「向量→词表分数」共享同一套语义，省一份参数。</text>
</svg>
