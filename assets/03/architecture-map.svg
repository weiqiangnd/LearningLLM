<text x="666" y="654" class="sub">交叉熵 loss、teacher forcing 与采样的关系</text>
<rect x="650" y="683" width="4" height="40" rx="2" fill="#64748b"/>
<text x="666" y="698" class="lbl">第 11 章 · 论文精读</text>
<text x="666" y="718" class="sub">Attention Is All You Need 逐节解读</text>
<rect x="650" y="747" width="4" height="40" rx="2" fill="#64748b"/>
<text x="666" y="762" class="lbl">第 12 章 · 论文串读</text>
<text x="666" y="782" class="sub">GPT / LLaMA / Qwen 系列的关键改动</text>
<rect x="650" y="811" width="4" height="40" rx="2" fill="#64748b"/>
<text x="666" y="826" class="lbl">第 13 章 · 从零实现 mini-GPT</text>
<text x="666" y="846" class="sub">把以上所有组件拼起来，训练 → 生成闭环</text>
