<rect x="44" y="689.0" width="58" height="22" rx="7" fill="#ffffff" stroke="#7a4fd0" stroke-width="1.4"/>
<text x="73" y="705.0" text-anchor="middle" class="tag" fill="#374151">第 4 章</text>
