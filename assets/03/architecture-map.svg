<text x="600.0" y="40" text-anchor="middle" class="title">阶段 2 全景：一个 LLM 从文本到下一个 token 的完整流水线</text>
<text x="600.0" y="64" text-anchor="middle" class="sub" font-size="13.5">左侧是流水线（自下而上：文本从底部进入、下一个 token 从顶部产出），右侧逐条列出阶段 2 每一章的分工</text>
