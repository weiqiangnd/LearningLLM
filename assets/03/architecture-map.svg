<text x="340" y="159" text-anchor="middle" class="lbl">Softmax</text>
<text x="340" y="178" text-anchor="middle" class="small">logits → 概率分布</text>
<rect x="502.0" y="150" width="84" height="24" rx="7" fill="#ffffff" stroke="#2f9d52" stroke-width="1.4"/>
