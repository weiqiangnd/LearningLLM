<text x="666" y="206" class="sub">文本 ↔ id：BPE / BBPE、词表、特殊 token</text>
<rect x="650" y="235" width="4" height="40" rx="2" fill="#c43f86"/>
<text x="666" y="250" class="lbl">第 4 章 · Embedding 与位置编码</text>
<text x="666" y="270" class="sub">id → 向量、weight tying；RoPE / 正弦 / ALiBi</text>
<rect x="650" y="299" width="4" height="40" rx="2" fill="#64748b"/>
<text x="666" y="314" class="lbl">第 5 章 · 从 RNN 到 attention</text>
<text x="666" y="334" class="sub">讲清注意力「为什么会出现」</text>
<rect x="650" y="363" width="4" height="40" rx="2" fill="#d9760f"/>
<text x="666" y="378" class="lbl">第 6 章 · Scaled Dot-Product Attention</text>
<text x="666" y="398" class="sub">Q / K / V、softmax、因果掩码</text>
<rect x="650" y="427" width="4" height="40" rx="2" fill="#d9760f"/>
<text x="666" y="442" class="lbl">第 7 章 · Multi-Head Attention 与 MQA / GQA</text>
<text x="666" y="462" class="sub">分头、拼接、形状变换全过程</text>
<rect x="650" y="491" width="4" height="40" rx="2" fill="#2f6fd0"/>
<text x="666" y="506" class="lbl">第 8 章 · FFN、残差连接、归一化</text>
<text x="666" y="526" class="sub">LayerNorm / RMSNorm / SwiGLU</text>
<rect x="650" y="555" width="4" height="40" rx="2" fill="#64748b"/>
<text x="666" y="570" class="lbl">第 9 章 · Transformer 整体架构</text>
<text x="666" y="590" class="sub">Decoder-only vs Encoder-Decoder、Pre / Post-LN</text>
<rect x="650" y="619" width="4" height="40" rx="2" fill="#2f9d52"/>
