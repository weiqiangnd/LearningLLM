<text x="340" y="870" text-anchor="middle" class="small">文本 ↔ id（BPE / BBPE / 词表）</text>
<rect x="502.0" y="842" width="73" height="24" rx="7" fill="#ffffff" stroke="#1f93b0" stroke-width="1.4"/>
<text x="538.5" y="859" text-anchor="middle" class="tag" fill="#374151">第 3 章</text>
<rect x="190.0" y="905.0" width="300" height="38" rx="11" fill="#eef1f4" stroke="#7c8896" stroke-width="1.8"/>
