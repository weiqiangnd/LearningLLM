<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 520" width="1150" height="520">
<style>text{font-family:Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;}</style>
<rect x="0" y="0" width="1150" height="520" fill="#ffffff"/>
<defs>
<marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker>
<marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/></marker>
</defs>
<text x="575.0" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">「切薄片再堆叠」视角：permute(2, 0, 1) 不搬数据，只换“取片方向”</text>
<text x="270" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">原张量 p · shape (2, 2, 3)</text>
<text x="185" y="132" text-anchor="end" font-size="13" fill="#374151">p[0] =</text>
<rect x="195" y="95" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="220.0" y="120.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">0</text>
<rect x="245" y="95" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="270.0" y="120.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">1</text>
<rect x="295" y="95" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="320.0" y="120.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">2</text>
<rect x="195" y="135" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="220.0" y="160.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">3</text>
<rect x="245" y="135" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="270.0" y="160.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">4</text>
<rect x="295" y="135" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="320.0" y="160.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">5</text>
<text x="185" y="237" text-anchor="end" font-size="13" fill="#374151">p[1] =</text>
<rect x="195" y="200" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="220.0" y="225.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">6</text>
<rect x="245" y="200" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="270.0" y="225.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">7</text>
<rect x="295" y="200" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="320.0" y="225.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">8</text>
<rect x="195" y="240" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="220.0" y="265.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">9</text>
<rect x="245" y="240" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="270.0" y="265.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">10</text>
<rect x="295" y="240" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="320.0" y="265.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">11</text>
<line x1="220.0" y1="288" x2="220.0" y2="306" stroke="#2563eb" stroke-width="2"/>
<polygon points="216.0,306 224.0,306 220.0,312" fill="#2563eb"/>
<text x="220.0" y="330" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2563eb" font-family="Menlo,Consolas,monospace">q[0]</text>
<line x1="270.0" y1="288" x2="270.0" y2="306" stroke="#ea580c" stroke-width="2"/>
<polygon points="266.0,306 274.0,306 270.0,312" fill="#ea580c"/>
<text x="270.0" y="330" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ea580c" font-family="Menlo,Consolas,monospace">q[1]</text>
<line x1="320.0" y1="288" x2="320.0" y2="306" stroke="#059669" stroke-width="2"/>
<polygon points="316.0,306 324.0,306 320.0,312" fill="#059669"/>
<text x="320.0" y="330" text-anchor="middle" font-size="12.5" font-weight="700" fill="#059669" font-family="Menlo,Consolas,monospace">q[2]</text>
<text x="270" y="350" text-anchor="middle" font-size="11.5" fill="#6b7280">每"列"（dim 2 上的一条）将各自变成 q 的一片</text>
<line x1="380" y1="215" x2="770" y2="215" stroke="#d97706" stroke-width="2.5" marker-end="url(#ar-amber)"/>
<text x="575.0" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e" font-family="Menlo,Consolas,monospace">p.permute(2, 0, 1)</text>
<text x="575.0" y="237" text-anchor="middle" font-size="11.5" fill="#92400e">step 1 · 沿 dim 2 切出 3 片，每片 shape (2, 2)</text>
<text x="575.0" y="253" text-anchor="middle" font-size="11.5" fill="#92400e">step 2 · 沿新 dim 0 把这 3 片顺序堆起来</text>
<text x="910" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">q = p.permute(2, 0, 1) · shape (3, 2, 2)</text>
<text x="850" y="132" text-anchor="end" font-size="13" font-weight="700" fill="#2563eb">q[0]</text>
<text x="970" y="132" text-anchor="start" font-size="11" fill="#6b7280" font-family="Menlo,Consolas,monospace">= p[:, :, 0]</text>
<rect x="860" y="95" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="885.0" y="120.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">0</text>
<rect x="910" y="95" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="935.0" y="120.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">3</text>
<rect x="860" y="135" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="885.0" y="160.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">6</text>
<rect x="910" y="135" width="50" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="935.0" y="160.0" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">9</text>
<text x="850" y="237" text-anchor="end" font-size="13" font-weight="700" fill="#ea580c">q[1]</text>
<text x="970" y="237" text-anchor="start" font-size="11" fill="#6b7280" font-family="Menlo,Consolas,monospace">= p[:, :, 1]</text>
<rect x="860" y="200" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="885.0" y="225.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">1</text>
<rect x="910" y="200" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="935.0" y="225.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">4</text>
<rect x="860" y="240" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="885.0" y="265.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">7</text>
<rect x="910" y="240" width="50" height="40" rx="3" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
<text x="935.0" y="265.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">10</text>
<text x="850" y="342" text-anchor="end" font-size="13" font-weight="700" fill="#059669">q[2]</text>
<text x="970" y="342" text-anchor="start" font-size="11" fill="#6b7280" font-family="Menlo,Consolas,monospace">= p[:, :, 2]</text>
<rect x="860" y="305" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="885.0" y="330.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">2</text>
<rect x="910" y="305" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="935.0" y="330.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">5</text>
<rect x="860" y="345" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="885.0" y="370.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">8</text>
<rect x="910" y="345" width="50" height="40" rx="3" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
<text x="935.0" y="370.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">11</text>
<line x1="910" y1="180" x2="910" y2="196" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ar-gray)"/>
<line x1="910" y1="285" x2="910" y2="301" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ar-gray)"/>
<text x="1030" y="200" text-anchor="start" font-size="11.5" fill="#6b7280">沿新 dim 0</text>
<text x="1030" y="216" text-anchor="start" font-size="11.5" fill="#6b7280">把 3 片堆叠</text>
<path d="M1016,105 Q1024,210 1016,375" stroke="#9ca3af" stroke-width="1.2" fill="none"/>
<rect x="195.0" y="456" width="16" height="16" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
<text x="219.0" y="470" font-size="12" fill="#374151">蓝 = dim 2 索引 0 → q[0]</text>
<rect x="460.0" y="456" width="16" height="16" rx="2" fill="#fed7aa" stroke="#ea580c" stroke-width="1.2"/>
<text x="484.0" y="470" font-size="12" fill="#374151">橙 = dim 2 索引 1 → q[1]</text>
<rect x="725.0" y="456" width="16" height="16" rx="2" fill="#bbf7d0" stroke="#059669" stroke-width="1.2"/>
<text x="749.0" y="470" font-size="12" fill="#374151">绿 = dim 2 索引 2 → q[2]</text>
<text x="575.0" y="500" text-anchor="middle" font-size="11.5" fill="#6b7280">核心：相同颜色的格子在两侧位置不同但数值不变 —— 元素从未离开内存位置，permute 只是改了 stride（取片方向）。</text>
</svg>