<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" font-family="'Noto Sans CJK SC', 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowFwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowBwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1000" height="540" fill="#ffffff"/>
  <text x="500" y="38" font-size="24" font-weight="600" fill="#374151" text-anchor="middle">autograd 计算图：forward 构建 + backward 沿链式法则回传</text>
  <text x="500" y="62" font-size="14" fill="#4b5563" text-anchor="middle">例：x=1.0, y = 2x + 3, loss = y² ；手算 dloss/dx = 2y · 2 = 20</text>

  <!-- Forward direction label (top) -->
  <g transform="translate(55, 108)">
    <text x="0" y="0" font-size="14" fill="#2563eb" font-weight="600">forward（构建计算图、保存中间值）</text>
    <line x1="0" y1="10" x2="240" y2="10" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowFwd)"/>
  </g>

  <!-- Backward direction label (bottom) -->
  <g transform="translate(690, 108)">
    <text x="240" y="0" font-size="14" fill="#ef4444" font-weight="600" text-anchor="end">backward（链式法则反向累加梯度）</text>
    <line x1="240" y1="10" x2="0" y2="10" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowBwd)"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#shadowSoft)">
    <!-- x: leaf -->
    <rect x="55"  y="165" width="170" height="92" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <!-- mul -->
    <rect x="290" y="165" width="170" height="92" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <!-- add -->
    <rect x="525" y="165" width="170" height="92" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <!-- pow -->
    <rect x="760" y="165" width="170" height="92" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>

  <!-- Node labels (forward values) -->
  <g font-size="14" fill="#374151">
    <text x="140" y="195" text-anchor="middle" font-weight="600">x</text>
    <text x="140" y="219" text-anchor="middle" font-size="13" fill="#4b5563">叶子, requires_grad=True</text>
    <text x="140" y="242" text-anchor="middle" font-size="14">value = 1.0</text>

    <text x="375" y="195" text-anchor="middle" font-weight="600">×2 → MulBackward</text>
    <text x="375" y="219" text-anchor="middle" font-size="13" fill="#4b5563">中间张量</text>
    <text x="375" y="242" text-anchor="middle" font-size="14">2x = 2.0</text>

    <text x="610" y="195" text-anchor="middle" font-weight="600">+3 → AddBackward</text>
    <text x="610" y="219" text-anchor="middle" font-size="13" fill="#4b5563">中间张量 y</text>
    <text x="610" y="242" text-anchor="middle" font-size="14">y = 5.0</text>

    <text x="845" y="195" text-anchor="middle" font-weight="600">·² → PowBackward</text>
    <text x="845" y="219" text-anchor="middle" font-size="13" fill="#1d4ed8">标量 loss</text>
    <text x="845" y="242" text-anchor="middle" font-size="14">loss = 25.0</text>
  </g>

  <!-- Forward arrows (blue) -->
  <g stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrowFwd)">
    <line x1="225" y1="200" x2="288" y2="200"/>
    <line x1="460" y1="200" x2="523" y2="200"/>
    <line x1="695" y1="200" x2="758" y2="200"/>
  </g>

  <!-- Backward arrows (red, below) -->
  <g stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrowBwd)" stroke-dasharray="6 4">
    <line x1="758" y1="232" x2="695" y2="232"/>
    <line x1="523" y1="232" x2="460" y2="232"/>
    <line x1="288" y1="232" x2="225" y2="232"/>
  </g>

  <!-- Backward gradient annotations -->
  <g font-size="13" fill="#b91c1c">
    <text x="727" y="302" text-anchor="middle">dloss/dy = 2y</text>
    <text x="727" y="320" text-anchor="middle" font-weight="600">= 10</text>

    <text x="492" y="302" text-anchor="middle">dy/d(2x) = 1</text>
    <text x="492" y="320" text-anchor="middle" font-weight="600">→ 累乘得 10</text>

    <text x="257" y="302" text-anchor="middle">d(2x)/dx = 2</text>
    <text x="257" y="320" text-anchor="middle" font-weight="600">→ x.grad = 20</text>
  </g>

  <!-- Result note -->
  <g transform="translate(55, 408)">
    <rect x="0" y="0" width="890" height="106" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="22" y="26" font-size="14" fill="#374151" font-weight="600">关键事实</text>
    <text x="22" y="50" font-size="13" fill="#374151">• loss.backward() 要求 loss 是<tspan font-weight="600"> 标量</tspan>；非标量需要先 .sum() 或显式传 gradient= 参数</text>
    <text x="22" y="71" font-size="13" fill="#374151">• 反向传播只把 .grad 累加到<tspan font-weight="600"> 叶子节点</tspan>；中间张量的 .grad 默认是 None（除非 retain_grad()）</text>
    <text x="22" y="92" font-size="13" fill="#374151">• 计算图<tspan font-weight="600"> 动态构建</tspan>（define-by-run）：每次 forward 重新建图；推理用 torch.no_grad() 不建图，省一大半显存</text>
  </g>
</svg>
