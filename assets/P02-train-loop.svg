<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" width="1080" height="540" font-family="'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrFwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrBwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1080" height="540" fill="#ffffff"/>
  <text x="540" y="38" font-size="22" font-weight="600" fill="#111827" text-anchor="middle">训练循环三步走 —— forward / backward / step（+ zero_grad）</text>
  <text x="540" y="60" font-size="13" fill="#6b7280" text-anchor="middle">这套骨架在预训练 / SFT / LoRA / RLHF 里几乎一字不改；只换 model、loss、optimizer 的具体实现</text>

  <!-- Top row: forward path -->
  <g filter="url(#shadowSoft)">
    <rect x="60"  y="120" width="180" height="90" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="310" y="120" width="180" height="90" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="560" y="120" width="180" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="810" y="120" width="210" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>

  <!-- forward step labels (top mini-tags) -->
  <text x="150" y="110" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">① forward</text>
  <text x="400" y="110" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">② loss</text>
  <text x="650" y="110" font-size="11" fill="#b45309" text-anchor="middle" font-weight="600">③ backward</text>
  <text x="915" y="110" font-size="11" fill="#b91c1c" text-anchor="middle" font-weight="600">④ step</text>

  <!-- Box bodies -->
  <text x="150" y="155" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">model(x)</text>
  <text x="150" y="180" font-size="12" fill="#374151" text-anchor="middle">输入 → 预测</text>
  <text x="150" y="198" font-size="11" fill="#6b7280" text-anchor="middle">动态构建计算图</text>

  <text x="400" y="155" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">loss_fn(pred, y)</text>
  <text x="400" y="180" font-size="12" fill="#374151" text-anchor="middle">预测 → 标量 loss</text>
  <text x="400" y="198" font-size="11" fill="#6b7280" text-anchor="middle">必须是 0 维张量</text>

  <text x="650" y="155" font-size="15" font-weight="600" fill="#92400e" text-anchor="middle">loss.backward()</text>
  <text x="650" y="180" font-size="12" fill="#374151" text-anchor="middle">沿计算图反向</text>
  <text x="650" y="198" font-size="11" fill="#6b7280" text-anchor="middle">把 ∂loss/∂θ 写到 θ.grad</text>

  <text x="915" y="155" font-size="15" font-weight="600" fill="#991b1b" text-anchor="middle">optimizer.step()</text>
  <text x="915" y="180" font-size="12" fill="#374151" text-anchor="middle">按 SGD/Adam 更新参数</text>
  <text x="915" y="198" font-size="11" fill="#6b7280" text-anchor="middle">用 .grad 改 .data</text>

  <!-- Forward arrows (blue) with data flow labels -->
  <line x1="240" y1="165" x2="305" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFwd)"/>
  <text x="272" y="155" font-size="11" fill="#1d4ed8" text-anchor="middle">pred</text>

  <line x1="490" y1="165" x2="555" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFwd)"/>
  <text x="522" y="155" font-size="11" fill="#1d4ed8" text-anchor="middle">loss</text>

  <line x1="740" y1="165" x2="805" y2="165" stroke="#dc2626" stroke-width="2" marker-end="url(#arrBwd)"/>
  <text x="772" y="155" font-size="11" fill="#b91c1c" text-anchor="middle">θ.grad</text>

  <!-- zero_grad bar -->
  <g filter="url(#shadowSoft)">
    <rect x="380" y="290" width="320" height="62" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="540" y="316" font-size="14" font-weight="600" fill="#065f46" text-anchor="middle">optimizer.zero_grad()</text>
  <text x="540" y="338" font-size="11" fill="#374151" text-anchor="middle">把所有 θ.grad 清零；不调梯度会累加，loss 一步比一步大</text>

  <!-- Loop back arrow: from step → down → left → up to forward -->
  <path d="M 915 215 L 915 260 L 540 260 L 540 285" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrLoop)"/>
  <path d="M 540 355 L 540 400 L 150 400 L 150 215" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrLoop)"/>
  <text x="730" y="278" font-size="11" fill="#6b7280">每个 batch 末尾</text>
  <text x="345" y="395" font-size="11" fill="#6b7280">下一个 batch</text>

  <!-- Code template -->
  <g filter="url(#shadowSoft)">
    <rect x="60" y="430" width="960" height="90" rx="10" fill="#1f2937" stroke="#111827"/>
  </g>
  <text x="80" y="455" font-size="12" fill="#9ca3af" font-family="'JetBrains Mono', Menlo, Consolas, monospace">for x, y in loader:</text>
  <text x="100" y="475" font-size="12" fill="#fcd34d" font-family="'JetBrains Mono', Menlo, Consolas, monospace">optimizer.zero_grad()                   # ← 务必先清零</text>
  <text x="100" y="492" font-size="12" fill="#a7f3d0" font-family="'JetBrains Mono', Menlo, Consolas, monospace">pred = model(x);  loss = loss_fn(pred, y)   # ← ① ②</text>
  <text x="100" y="509" font-size="12" fill="#fda4af" font-family="'JetBrains Mono', Menlo, Consolas, monospace">loss.backward();  optimizer.step()           # ← ③ ④</text>

  <!-- Legend -->
  <g transform="translate(60, 80)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#arrFwd)"/>
    <text x="26" y="4" font-size="11" fill="#374151">forward</text>
    <line x1="100" y1="0" x2="120" y2="0" stroke="#dc2626" stroke-width="2" marker-end="url(#arrBwd)"/>
    <text x="126" y="4" font-size="11" fill="#374151">backward</text>
    <line x1="208" y1="0" x2="228" y2="0" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrLoop)"/>
    <text x="234" y="4" font-size="11" fill="#374151">下一轮</text>
  </g>
</svg>
