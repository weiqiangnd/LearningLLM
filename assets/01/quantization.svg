<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 720" width="1220" height="720">
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowE" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowGlass" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
    text { font-family: 'Noto Sans CJK SC', 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #374151; }
    .subtitle { font-size: 15px; font-weight: 500; fill: #374151; }
    .section { font-size: 15px; font-weight: 700; fill: #2563eb; letter-spacing: 1.4px; }
    .section-sub { font-size: 14px; font-weight: 500; fill: #334155; }
    .node-title { font-size: 19px; font-weight: 700; fill: #374151; }
    .node-sub { font-size: 14px; font-weight: 500; fill: #374151; }
    .node-type { font-size: 14px; font-weight: 700; fill: #374151; letter-spacing: 0.06em; }
    .arrow-label { font-size: 14px; font-weight: 600; fill: #374151; }
    .legend { font-size: 14px; font-weight: 500; fill: #374151; }
    .footnote { font-size: 14px; font-weight: 500; fill: #334155; }
    </style>
  </defs>
  <rect width="1220.0" height="720.0" fill="#ffffff"/>
  <text x="610.0" y="56" text-anchor="middle" class="title">4-bit (INT4) 量化流水线：以 8 个权重为例</text>
  <path d="M 388.0,165.0 L 430.0,165.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 770.0,165.0 L 850.0,165.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 1015.0,220.0 L 1015.0,240.4 L 370.0,299.6 L 370.0,320.0" fill="none" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <path d="M 545.0,375.0 L 660.0,375.0" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowC)"/>
  <path d="M 840.0,430.0 L 840.0,450.4 L 610.0,457.6 L 610.0,478.0" fill="none" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)" stroke-dasharray="6,4"/>
  <rect x="30.0" y="110.0" width="350.0" height="110.0" rx="10.0" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="205.0" y="128.0" text-anchor="middle" class="node-type">INPUT (16 bytes)</text>
  <text x="205.0" y="171.0" text-anchor="middle" class="node-title">BF16 权重块</text>
  <text x="205.0" y="193.0" text-anchor="middle" class="node-sub">W = [0.42, -1.23, 0.78, 1.40, -0.34, 1.05, -0.91, 0.12]</text>
  <rect x="430.0" y="110.0" width="340.0" height="110.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="600.0" y="128.0" text-anchor="middle" class="node-type">CALIBRATION</text>
  <text x="600.0" y="171.0" text-anchor="middle" class="node-title">Step 1 / 2 — 算 absmax 与 scale</text>
  <text x="600.0" y="193.0" text-anchor="middle" class="node-sub">absmax = max|wᵢ| = 1.40    scale = 1.40 / 7 = 0.2</text>
  <rect x="850.0" y="110.0" width="330.0" height="110.0" rx="10.0" fill="#fff7ed" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="1015.0" y="128.0" text-anchor="middle" class="node-type">QUANTIZE → INT4</text>
  <text x="1015.0" y="171.0" text-anchor="middle" class="node-title">Step 3 — 量化 (round(wᵢ/scale))</text>
  <text x="1015.0" y="193.0" text-anchor="middle" class="node-sub">q = [2, -6, 4, 7, -2, 5, -5, 1]    每个 ∈ {-8..7}</text>
  <rect x="200.0" y="320.0" width="340.0" height="110.0" rx="10.0" fill="#faf5ff" stroke="#9333ea" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="370.0" y="338.0" text-anchor="middle" class="node-type">STORAGE (6 bytes ≈ 1/2.7×)</text>
  <text x="370.0" y="381.0" text-anchor="middle" class="node-title">Step 4 — 存储 (落盘 / 显存)</text>
  <text x="370.0" y="403.0" text-anchor="middle" class="node-sub">8 × INT4 (4 B) + 1 × FP16 scale (2 B)</text>
  <rect x="660.0" y="320.0" width="360.0" height="110.0" rx="10.0" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="840.0" y="338.0" text-anchor="middle" class="node-type">DEQUANT  ŵᵢ = qᵢ · scale</text>
  <text x="840.0" y="381.0" text-anchor="middle" class="node-title">Step 5 — 反量化 (推理时)</text>
  <text x="840.0" y="403.0" text-anchor="middle" class="node-sub">ŵ ≈ [0.40, -1.20, 0.80, 1.40, -0.40, 1.00, -1.00, 0.20]</text>
  <rect x="200.0" y="478.0" width="820.0" height="92.0" rx="10.0" fill="#fefce8" stroke="#ca8a04" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="610.0" y="496.0" text-anchor="middle" class="node-type">NF4 + DOUBLE QUANT</text>
  <text x="610.0" y="530.0" text-anchor="middle" class="node-title">工程优化（bitsandbytes 默认）</text>
  <text x="610.0" y="552.0" text-anchor="middle" class="node-sub">NF4：把 16 个量化点放在正态分位数上     双量化：把 scale 再做一次 8-bit 量化，再省 ~0.4 B / 权重</text>
  <rect x="353.0" y="134.0" width="76" height="22" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="391.0" y="149.5" text-anchor="middle" class="arrow-label">8 × FP16</text>
  <rect x="784.0" y="134.0" width="52" height="22" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="810.0" y="149.5" text-anchor="middle" class="arrow-label">scale</text>
  <rect x="566.0" y="239.0" width="128" height="22" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="630.0" y="254.5" text-anchor="middle" class="arrow-label">保存 q + scale</text>
  <rect x="542.0" y="360.0" width="122" height="22" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="603.0" y="375.5" text-anchor="middle" class="arrow-label">matmul 前还原</text>
  <rect x="656.0" y="439.0" width="88" height="22" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="700.0" y="454.5" text-anchor="middle" class="arrow-label">实际生产配置</text>
  <line x1="42.0" y1="600.0" x2="72.0" y2="600.0" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <text x="82.0" y="604.0" class="legend">原始/中间数据</text>
  <line x1="42.0" y1="622.0" x2="72.0" y2="622.0" stroke="#10b981" stroke-width="2.4" marker-end="url(#arrowB)"/>
  <text x="82.0" y="626.0" class="legend">写入存储</text>
  <line x1="42.0" y1="644.0" x2="72.0" y2="644.0" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowC)"/>
  <text x="82.0" y="648.0" class="legend">推理时读出</text>
  <line x1="42.0" y1="666.0" x2="72.0" y2="666.0" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <text x="82.0" y="670.0" class="legend">工程改良</text>
</svg>