<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowE" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowGlass" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 30px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 14px; font-weight: 500; fill: #6b7280; }
    .section { font-size: 13px; font-weight: 700; fill: #2563eb; letter-spacing: 1.4px; }
    .section-sub { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    .node-title { font-size: 18px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 12px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
    .arrow-label { font-size: 12px; font-weight: 600; fill: #6b7280; }
    .legend { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .footnote { font-size: 12px; font-weight: 500; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1280.0" height="780.0" fill="#ffffff"/>
  <text x="640.0" y="56" text-anchor="middle" class="title">generate() 内部流水线：每生成一个新 token 走一遍</text>
  <rect x="30.0" y="90.0" width="1220.0" height="130.0" rx="16.0" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="48.0" y="114.0" class="section">PREPARE</text>
  <rect x="30.0" y="240.0" width="1220.0" height="130.0" rx="16.0" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="48.0" y="264.0" class="section">FORWARD + 取末位 LOGITS</text>
  <rect x="30.0" y="390.0" width="1220.0" height="130.0" rx="16.0" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="48.0" y="414.0" class="section">LOGIT 处理（按顺序）</text>
  <rect x="30.0" y="540.0" width="1220.0" height="150.0" rx="16.0" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="48.0" y="564.0" class="section">采样 → 拼回 → 终止判断</text>
  <path d="M 270.0,159.0 L 340.0,159.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 560.0,159.0 L 640.0,159.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 740.0,194.0 L 740.0,214.4 L 500.0,214.4 L 500.0,274.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 620.0,309.0 L 700.0,309.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 820.0,344.0 L 820.0,364.4 L 170.0,364.4 L 170.0,424.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 270.0,459.0 L 320.0,459.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 520.0,459.0 L 570.0,459.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 770.0,459.0 L 820.0,459.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 1020.0,459.0 L 1060.0,459.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 1145.0,494.0 L 1145.0,514.4 L 240.0,514.4 L 240.0,580.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 350.0,620.0 L 430.0,620.0" fill="none" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <path d="M 630.0,620.0 L 700.0,620.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 940.0,620.0 L 1010.0,620.0" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <path d="M 820.0,580.0 L 820.0,360.0 L 500.0,360.0 L 500.0,344.0" fill="none" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)" stroke-dasharray="6,4"/>
  <rect x="70.0" y="124.0" width="200.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#d1d5db" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="170.0" y="142.0" text-anchor="middle" class="node-type">USER INPUT</text>
  <text x="170.0" y="165.0" text-anchor="middle" class="node-title">messages / prompt</text>
  <text x="170.0" y="187.0" text-anchor="middle" class="node-sub">[{role, content}, ...]</text>
  <rect x="340.0" y="124.0" width="220.0" height="70.0" rx="10.0" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="450.0" y="142.0" text-anchor="middle" class="node-type">TEXT → TOKEN ID</text>
  <text x="450.0" y="165.0" text-anchor="middle" class="node-title">apply_chat_template + tokenizer</text>
  <text x="450.0" y="187.0" text-anchor="middle" class="node-sub">拼成训练时格式 → BPE 切分</text>
  <rect x="640.0" y="124.0" width="200.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#d1d5db" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="740.0" y="142.0" text-anchor="middle" class="node-type">TENSOR</text>
  <text x="740.0" y="165.0" text-anchor="middle" class="node-title">input_ids</text>
  <text x="740.0" y="187.0" text-anchor="middle" class="node-sub">shape = [1, L]</text>
  <rect x="380.0" y="274.0" width="240.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#16a34a" stroke-width="2.0" filter="url(#shadowSoft)"/>
  <rect x="386.0" y="280.0" width="228.0" height="58.0" rx="7.0" fill="none" stroke="#16a34a" stroke-width="1.2" opacity="0.65"/>
  <text x="500.0" y="292.0" text-anchor="middle" class="node-type">DECODER-ONLY LM</text>
  <text x="500.0" y="315.0" text-anchor="middle" class="node-title">model.forward()</text>
  <text x="500.0" y="337.0" text-anchor="middle" class="node-sub">embedding → N×Transformer → LM head</text>
  <rect x="700.0" y="274.0" width="240.0" height="70.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="820.0" y="292.0" text-anchor="middle" class="node-type">RAW SCORES</text>
  <text x="820.0" y="315.0" text-anchor="middle" class="node-title">last_logits</text>
  <text x="820.0" y="337.0" text-anchor="middle" class="node-sub">shape = [V]，V ≈ 152k (Qwen3)</text>
  <rect x="70.0" y="424.0" width="200.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="170.0" y="442.0" text-anchor="middle" class="node-type">STEP 1 — 缩放</text>
  <text x="170.0" y="465.0" text-anchor="middle" class="node-title">÷ temperature</text>
  <text x="170.0" y="487.0" text-anchor="middle" class="node-sub">T&lt;1 锐化 / T&gt;1 抹平</text>
  <rect x="320.0" y="424.0" width="200.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="420.0" y="442.0" text-anchor="middle" class="node-type">STEP 2 — 抑制重复</text>
  <text x="420.0" y="465.0" text-anchor="middle" class="node-title">repetition_penalty</text>
  <text x="420.0" y="487.0" text-anchor="middle" class="node-sub">已出现 token 的 logit 罚一刀</text>
  <rect x="570.0" y="424.0" width="200.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="670.0" y="442.0" text-anchor="middle" class="node-type">STEP 3 — 长尾过滤</text>
  <text x="670.0" y="465.0" text-anchor="middle" class="node-title">top-k / top-p 截断</text>
  <text x="670.0" y="487.0" text-anchor="middle" class="node-sub">只保留候选集，其余设 -∞</text>
  <rect x="820.0" y="424.0" width="200.0" height="70.0" rx="10.0" fill="#fff7ed" stroke="#f97316" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="920.0" y="442.0" text-anchor="middle" class="node-type">STEP 4 — 归一化</text>
  <text x="920.0" y="465.0" text-anchor="middle" class="node-title">softmax</text>
  <text x="920.0" y="487.0" text-anchor="middle" class="node-sub">P(tᵢ) = exp(ℓᵢ) / Σ exp(ℓⱼ)</text>
  <rect x="1060.0" y="424.0" width="170.0" height="70.0" rx="10.0" fill="#ffffff" stroke="#d1d5db" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="1145.0" y="442.0" text-anchor="middle" class="node-type">PROB DIST</text>
  <text x="1145.0" y="465.0" text-anchor="middle" class="node-title">P(next_token)</text>
  <text x="1145.0" y="487.0" text-anchor="middle" class="node-sub">shape = [V]</text>
  <rect x="130.0" y="580.0" width="220.0" height="80.0" rx="10.0" fill="#faf5ff" stroke="#9333ea" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="240.0" y="598.0" text-anchor="middle" class="node-type">do_sample=True</text>
  <text x="240.0" y="626.0" text-anchor="middle" class="node-title">multinomial 采样</text>
  <text x="240.0" y="648.0" text-anchor="middle" class="node-sub">(False 即 argmax → 贪心)</text>
  <rect x="430.0" y="580.0" width="200.0" height="80.0" rx="10.0" fill="#ffffff" stroke="#d1d5db" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="530.0" y="598.0" text-anchor="middle" class="node-type">1 × INT</text>
  <text x="530.0" y="626.0" text-anchor="middle" class="node-title">new token</text>
  <text x="530.0" y="648.0" text-anchor="middle" class="node-sub">拼到 input_ids 末尾</text>
  <rect x="700.0" y="580.0" width="240.0" height="80.0" rx="10.0" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="820.0" y="598.0" text-anchor="middle" class="node-type">EOS / max_new_tokens</text>
  <text x="820.0" y="626.0" text-anchor="middle" class="node-title">停止判断</text>
  <text x="820.0" y="648.0" text-anchor="middle" class="node-sub">命中 → 退出循环</text>
  <rect x="1010.0" y="580.0" width="220.0" height="80.0" rx="10.0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadowSoft)"/>
  <text x="1120.0" y="598.0" text-anchor="middle" class="node-type">TOKEN ID → TEXT</text>
  <text x="1120.0" y="626.0" text-anchor="middle" class="node-title">tokenizer.decode()</text>
  <text x="1120.0" y="648.0" text-anchor="middle" class="node-sub">输出最终回复字符串</text>
  <rect x="463.5" y="366.4" width="63" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="495.0" y="380.4" text-anchor="middle" class="arrow-label">取末位 [V]</text>
  <rect x="947.0" y="590.0" width="56" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="975.0" y="604.0" text-anchor="middle" class="arrow-label">命中 EOS</text>
  <rect x="548.0" y="362.0" width="224" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="660.0" y="376.0" text-anchor="middle" class="arrow-label">未命中 → 继续 (autoregressive loop)</text>
  <line x1="42.0" y1="705.0" x2="72.0" y2="705.0" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowA)"/>
  <text x="82.0" y="709.0" class="legend">控制流</text>
  <line x1="42.0" y1="727.0" x2="72.0" y2="727.0" stroke="#f97316" stroke-width="2.4" marker-end="url(#arrowE)"/>
  <text x="82.0" y="731.0" class="legend">张量数据流</text>
  <line x1="42.0" y1="749.0" x2="72.0" y2="749.0" stroke="#ef4444" stroke-width="2.4" marker-end="url(#arrowG)"/>
  <text x="82.0" y="753.0" class="legend">自回归循环（loop back）</text>
</svg>