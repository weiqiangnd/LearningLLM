<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="aBlue" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#2563eb"/></marker>
    <marker id="aGray" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="aOrange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#ea580c"/></marker>
    <marker id="aGreen" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#059669"/></marker>
    <marker id="aRed" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#7c3aed"/></marker>
    <marker id="aTeal" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#0d9488"/></marker>
  </defs>

  <style>
    text { font-family: 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Zen Hei', sans-serif; }
    .title  { font-size: 24px; font-weight: 700; fill: #374151; }
    .lbl    { font-size: 16px; font-weight: 600; fill: #374151; }
    .sub    { font-size: 14px; fill: #334155; }
    .mono   { font-size: 15px; font-family: 'Noto Sans Mono CJK SC','SFMono-Regular','Consolas','Liberation Mono',monospace; fill: #374151; }
    .monob  { font-size: 17px; font-weight: 700; font-family: 'Noto Sans Mono CJK SC','SFMono-Regular','Consolas','Liberation Mono',monospace; fill: #374151; }
    .monos  { font-size: 13px; font-family: 'Noto Sans Mono CJK SC','SFMono-Regular','Consolas','Liberation Mono',monospace; fill: #374151; }
    .small  { font-size: 13px; fill: #334155; }
    .cap    { font-size: 14px; fill: #334155; }
    .tag    { font-size: 13px; font-weight: 600; }
  </style>
<text x="590.0" y="44" text-anchor="middle" class="title">从输入 X 投影出 Q / K / V —— 同一个序列，三套可学习投影，三个角色</text>
<rect x="100.0" y="242.0" width="150" height="96" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="175" y="286" text-anchor="middle" class="monob">X</text>
<text x="175" y="306" text-anchor="middle" class="small">输入序列 [L, d]</text>
<text x="175" y="352" text-anchor="middle" class="small">L 个 token</text>
<text x="175" y="370" text-anchor="middle" class="small">每个 d 维（含位置编码）</text>
<line x1="250" y1="290" x2="470" y2="150" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="474.0" y="120.0" width="132" height="60" rx="11" fill="#f3f4f6" stroke="#7c3aed" stroke-width="2"/>
<text x="540" y="146" text-anchor="middle" class="mono">W_Q</text>
<text x="540" y="166" text-anchor="middle" class="small">[d, d_k]</text>
<line x1="606" y1="150" x2="708" y2="150" stroke="#7c3aed" stroke-width="2" marker-end="url(#aPurple)"/>
<rect x="730.0" y="120.0" width="120" height="60" rx="11" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="790" y="146" text-anchor="middle" class="monob">Q</text>
<text x="790" y="166" text-anchor="middle" class="small">[L, d_k]</text>
<text x="868" y="155" class="sub">查询 Query：我要找什么</text>
<line x1="250" y1="290" x2="470" y2="290" stroke="#ea580c" stroke-width="2" marker-end="url(#aOrange)"/>
<rect x="474.0" y="260.0" width="132" height="60" rx="11" fill="#f3f4f6" stroke="#ea580c" stroke-width="2"/>
<text x="540" y="286" text-anchor="middle" class="mono">W_K</text>
<text x="540" y="306" text-anchor="middle" class="small">[d, d_k]</text>
<line x1="606" y1="290" x2="708" y2="290" stroke="#ea580c" stroke-width="2" marker-end="url(#aOrange)"/>
<rect x="730.0" y="260.0" width="120" height="60" rx="11" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="790" y="286" text-anchor="middle" class="monob">K</text>
<text x="790" y="306" text-anchor="middle" class="small">[L, d_k]</text>
<text x="868" y="295" class="sub">键 Key：我拿什么被匹配</text>
<line x1="250" y1="290" x2="470" y2="430" stroke="#059669" stroke-width="2" marker-end="url(#aGreen)"/>
<rect x="474.0" y="400.0" width="132" height="60" rx="11" fill="#f3f4f6" stroke="#059669" stroke-width="2"/>
<text x="540" y="426" text-anchor="middle" class="mono">W_V</text>
<text x="540" y="446" text-anchor="middle" class="small">[d, d_k]</text>
<line x1="606" y1="430" x2="708" y2="430" stroke="#059669" stroke-width="2" marker-end="url(#aGreen)"/>
<rect x="730.0" y="400.0" width="120" height="60" rx="11" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
<text x="790" y="426" text-anchor="middle" class="monob">V</text>
<text x="790" y="446" text-anchor="middle" class="small">[L, d_k]</text>
<text x="868" y="435" class="sub">值 Value：匹配上交出什么</text>
<text x="590.0" y="534" text-anchor="middle" class="cap">Q 与 K 维度必须相同（要做点积）；本章取 d_v = d_k。W_Q ≠ W_K ≠ W_V 各自学一套侧重，是注意力「不对称」的根源。</text>
</svg>
