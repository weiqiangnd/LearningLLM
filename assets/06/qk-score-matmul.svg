<text x="820.0" y="412" text-anchor="middle" class="mono">高亮格 S₂₃ = q₂ · k₃ = (0, 1) · (0, 1) = 0×0 + 1×1 = 1</text>
<text x="820.0" y="458" text-anchor="middle" class="cap">S 的第 i 行 j 列 = Q 第 i 行（qᵢ）与 Kᵀ 第 j 列（kⱼ）的点积 —— 一个矩阵乘把 L×L 个点积全算完。</text>
