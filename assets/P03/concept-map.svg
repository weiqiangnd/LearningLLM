<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="'Noto Sans CJK SC', 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>
  <text x="550" y="38" font-size="24" font-weight="600" fill="#374151" text-anchor="middle">概率与信息论概念关系图 —— logits / softmax / NLL / 交叉熵 / KL / MLE</text>
  <text x="550" y="62" font-size="14" fill="#374151" text-anchor="middle">看似五样不同的工具，本质上是同一根链条；标蓝箭头是恒等变换，标紫是定义，绿是等价，橙是约束</text>

  <!-- Tier 1: logits -->
  <g filter="url(#shadowSoft)">
    <rect x="405" y="100" width="290" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="550" y="128" font-size="16" font-weight="600" fill="#1e3a8a" text-anchor="middle">logits  ℓ ∈ ℝᴷ</text>
  <text x="550" y="151" font-size="13" fill="#374151" text-anchor="middle">模型最后一层 raw 输出（任意实数，未归一）</text>

  <!-- Tier 2: probability distribution q -->
  <g filter="url(#shadowSoft)">
    <rect x="405" y="220" width="290" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="550" y="248" font-size="16" font-weight="600" fill="#5b21b6" text-anchor="middle">概率分布  q = softmax(ℓ)</text>
  <text x="550" y="271" font-size="13" fill="#374151" text-anchor="middle">qᵢ = exp(ℓᵢ) / Σ exp(ℓⱼ)</text>
  <text x="550" y="290" font-size="13" fill="#374151" text-anchor="middle">∑ qᵢ = 1，qᵢ ∈ [0, 1]</text>

  <!-- arrow logits → q -->
  <line x1="550" y1="170" x2="550" y2="217" stroke="#2563eb" stroke-width="2" marker-end="url(#ar1)"/>
  <text x="565" y="198" font-size="13" fill="#1d4ed8">softmax</text>

  <!-- Side: temperature -->
  <g filter="url(#shadowSoft)">
    <rect x="730" y="225" width="220" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  </g>
  <text x="840" y="252" font-size="15" font-weight="600" fill="#9a3412" text-anchor="middle">temperature 缩放</text>
  <text x="840" y="273" font-size="13" fill="#374151" text-anchor="middle">softmax(ℓ / T)</text>
  <text x="840" y="291" font-size="13" fill="#374151" text-anchor="middle">T&gt;1 扁平 / T&lt;1 尖锐</text>
  <line x1="670" y1="260" x2="727" y2="260" stroke="#f97316" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar4)"/>

  <!-- Side: log-softmax (numerically stable, used in training) -->
  <g filter="url(#shadowSoft)">
    <rect x="150" y="225" width="220" height="70" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="260" y="252" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">log_softmax</text>
  <text x="260" y="273" font-size="13" fill="#374151" text-anchor="middle">log qᵢ = ℓᵢ − logsumexp(ℓ)</text>
  <text x="260" y="291" font-size="13" fill="#374151" text-anchor="middle">数值稳定；训练里直接拿来算 loss</text>
  <line x1="430" y1="260" x2="373" y2="260" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar1)"/>

  <!-- Tier 3: three "loss" boxes -->
  <!-- 3a: NLL -->
  <g filter="url(#shadowSoft)">
    <rect x="70" y="360" width="260" height="100" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="200" y="387" font-size="15" font-weight="600" fill="#065f46" text-anchor="middle">负对数似然 NLL</text>
  <text x="200" y="411" font-size="13" fill="#374151" text-anchor="middle">−⟨ log q[真实类别 y] ⟩</text>
  <text x="200" y="432" font-size="13" fill="#374151" text-anchor="middle">把训练样本的真实类位的</text>
  <text x="200" y="450" font-size="13" fill="#374151" text-anchor="middle">log 概率取负、求平均</text>

  <!-- 3b: Cross-entropy -->
  <g filter="url(#shadowSoft)">
    <rect x="420" y="360" width="260" height="100" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="550" y="387" font-size="15" font-weight="600" fill="#1e3a8a" text-anchor="middle">交叉熵 H(p, q)</text>
  <text x="550" y="411" font-size="13" fill="#374151" text-anchor="middle">−Σᵢ pᵢ log qᵢ</text>
  <text x="550" y="432" font-size="13" fill="#374151" text-anchor="middle">用模型分布 q 编码真实分布</text>
  <text x="550" y="450" font-size="13" fill="#374151" text-anchor="middle">p 的样本要花多少 nat</text>

  <!-- 3c: KL -->
  <g filter="url(#shadowSoft)">
    <rect x="770" y="360" width="260" height="100" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="900" y="387" font-size="15" font-weight="600" fill="#5b21b6" text-anchor="middle">KL 散度 D(p ∥ q)</text>
  <text x="900" y="411" font-size="13" fill="#374151" text-anchor="middle">Σᵢ pᵢ log(pᵢ / qᵢ)</text>
  <text x="900" y="432" font-size="13" fill="#374151" text-anchor="middle">不对称、≥ 0；衡量 q 替代</text>
  <text x="900" y="450" font-size="13" fill="#374151" text-anchor="middle">p 损失了多少信息</text>

  <!-- arrows from log-softmax + p → NLL / CE -->
  <line x1="200" y1="295" x2="200" y2="357" stroke="#10b981" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="80" y="332" font-size="13" fill="#065f46">p one-hot 时</text>
  <line x1="550" y1="300" x2="550" y2="357" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="565" y="332" font-size="13" fill="#5b21b6">代入定义</text>

  <!-- Equivalence chain: NLL ≡ CE (under one-hot) -->
  <line x1="330" y1="410" x2="418" y2="410" stroke="#10b981" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="374" y="400" font-size="13" fill="#065f46" text-anchor="middle">≡ 等价</text>
  <text x="374" y="424" font-size="13" fill="#374151" text-anchor="middle">p one-hot</text>

  <!-- CE = H(p) + KL -->
  <line x1="680" y1="410" x2="768" y2="410" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="724" y="400" font-size="13" fill="#5b21b6" text-anchor="middle">H(p)+</text>
  <text x="724" y="424" font-size="13" fill="#374151" text-anchor="middle">H(p) 是常数</text>

  <!-- Tier 4: MLE -->
  <g filter="url(#shadowSoft)">
    <rect x="180" y="510" width="380" height="80" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  <text x="370" y="537" font-size="15" font-weight="600" fill="#92400e" text-anchor="middle">极大似然估计 MLE</text>
  <text x="370" y="559" font-size="13" fill="#374151" text-anchor="middle">θ★ = argmax Σₙ log p(xₙ | θ) = argmin NLL</text>
  <text x="370" y="578" font-size="13" fill="#374151" text-anchor="middle">"找让数据最可能的参数"</text>

  <line x1="200" y1="460" x2="280" y2="507" stroke="#d97706" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="195" y="488" font-size="13" fill="#92400e">取负、求平均</text>

  <!-- Tier 4b: 训练目标 -->
  <g filter="url(#shadowSoft)">
    <rect x="600" y="510" width="380" height="80" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  </g>
  <text x="790" y="537" font-size="15" font-weight="600" fill="#991b1b" text-anchor="middle">LLM 训练目标</text>
  <text x="790" y="559" font-size="13" fill="#374151" text-anchor="middle">L = −(1/T) Σₜ log pθ(xₜ | x&lt;t)</text>
  <text x="790" y="578" font-size="13" fill="#374151" text-anchor="middle">F.cross_entropy（必须传 raw logits！）</text>

  <line x1="550" y1="460" x2="700" y2="507" stroke="#dc2626" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="628" y="488" font-size="13" fill="#991b1b">按 token 位置求平均</text>

  <!-- Bottom callout: KL 在对齐里的用法 -->
  <g filter="url(#shadowSoft)">
    <rect x="60" y="630" width="980" height="64" rx="10" fill="#1f2937" stroke="#111827"/>
  </g>
  <text x="80" y="654" font-size="14" fill="#fcd34d" font-family="'Noto Sans Mono CJK SC', 'JetBrains Mono', Menlo, Consolas, monospace">RLHF / PPO / DPO 里见到的 β · D_KL(π_θ ∥ π_ref)：</text>
  <text x="80" y="674" font-size="14" fill="#a7f3d0" font-family="'Noto Sans Mono CJK SC', 'JetBrains Mono', Menlo, Consolas, monospace">  让对齐后的策略 π_θ 不要离参考 π_ref 太远 —— 这是上面 KL 框的"约束"用法（reverse KL，mode-seeking）</text>

  <!-- Legend strip -->
  <g transform="translate(60, 80)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#2563eb" stroke-width="2" marker-end="url(#ar1)"/>
    <text x="26" y="4" font-size="13" fill="#374151">恒等变换（softmax / log_softmax）</text>
    <line x1="248" y1="0" x2="268" y2="0" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar2)"/>
    <text x="274" y="4" font-size="13" fill="#374151">定义代入</text>
    <line x1="380" y1="0" x2="400" y2="0" stroke="#10b981" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="406" y="4" font-size="13" fill="#374151">等价（特定条件下）</text>
    <line x1="560" y1="0" x2="580" y2="0" stroke="#f97316" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar4)"/>
    <text x="586" y="4" font-size="13" fill="#374151">侧路（temperature / 训练目标）</text>
  </g>
</svg>
